<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chart Renderer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --page-bg: linear-gradient(145deg, #d7e7df, #bfd6ce);
      --card-bg: rgba(243,250,246,0.82);
      --title-color: #184f3f;
      --text-color: #2f6f5d;
      --grid-color: rgba(24,79,63,0.2);
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--page-bg);
      color: var(--text-color);
    }
    .wrap {
      box-sizing: border-box;
      width: 1280px;
      height: 760px;
      margin: 0 auto;
      padding: 12px;
    }
    .card {
      width: 100%;
      height: 100%;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .transport {
      font-size: 12px;
      line-height: 1.4;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      color: var(--title-color);
      background: rgba(255,255,255,0.35);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .title {
      margin: 10px 12px 0;
      font-size: 20px;
      font-weight: 700;
      color: var(--title-color);
    }
    .content {
      position: relative;
      flex: 1;
      padding: 8px 12px 12px;
    }
    #chart-root {
      width: 100%;
      height: 100%;
    }
    .msg {
      padding: 12px;
      margin: 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.7);
      color: #7a1f1f;
      border: 1px solid rgba(122,31,31,0.25);
      font-size: 14px;
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet" />
  <style id="chart-theme-injected">
    :root {
      --custom-page-bg: linear-gradient(145deg, #d7e7df, #bfd6ce); --custom-card-bg: rgba(243,250,246,0.82); --custom-title: #184f3f; --custom-text: #2f6f5d; --custom-grid: rgba(24,79,63,0.2); --custom-x-axis-label: #184f3f; --custom-x-axis-value: #2f6f5d; --custom-y-axis-label: #184f3f; --custom-y-axis-value: #2f6f5d; --custom-legend-text: #184f3f;
      --requested-card-width: 1280px; --requested-card-height: 760px; --requested-plot-height: calc(760px - 156px);
      --bg-a: #d7e7df;
      --bg-b: #bfd6ce;
      --card: rgba(243, 250, 246, 0.82);
      --ink: #184f3f;
      --ink-soft: #2f6f5d;
      --line: rgba(24, 79, 63, 0.2);
      --shadow: 0 28px 60px rgba(23, 58, 52, 0.22);      --custom-x-axis-label: #184f3f;
      --custom-x-axis-value: #2f6f5d;
      --custom-y-axis-label: #184f3f;
      --custom-y-axis-value: #2f6f5d;
      --custom-legend-text: #184f3f;    }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Source Sans 3", "Segoe UI", sans-serif !important;
      color: var(--ink);
      display: block !important;
      align-items: initial !important;
      justify-content: initial !important;
      background:
        radial-gradient(circle at 8% 0%, rgba(255, 255, 255, 0.52), transparent 38%),
        radial-gradient(circle at 90% 100%, rgba(255, 255, 255, 0.4), transparent 35%),
        var(--custom-page-bg, linear-gradient(145deg, var(--bg-a), var(--bg-b))) !important;
      padding: clamp(16px, 2.5vw, 34px);
      box-sizing: border-box;
    }

    .page-shell {
      width: min(var(--requested-card-width), calc(100vw - 32px));
      max-width: none;
      margin: 0 auto;
    }

    .wrap {
      max-width: none !important;
      width: 100%;
      margin: 0 !important;
      padding: 0 !important;
    }

    .chart-card {
      background: var(--custom-card-bg, var(--card));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      min-height: min(var(--requested-card-height), calc(100vh - 32px));
      padding: clamp(14px, 2.5vw, 28px);
      backdrop-filter: blur(2px);
      box-sizing: border-box;
    }

    h1, h2, h3, .chart-title, canvas + div {
      font-family: "Merriweather", Georgia, serif !important;
      color: var(--custom-title, var(--ink)) !important;
    }

    #transport-summary {
      font-size: 13px !important;
      font-weight: 600;
      color: var(--custom-text, var(--ink-soft)) !important;
      background: rgba(255, 255, 255, 0.7) !important;
      border: 1px solid var(--line) !important;
      border-radius: 10px !important;
      padding: 8px 12px !important;
      margin-bottom: 12px !important;
    }

    #error {
      border-radius: 10px !important;
      border: 1px solid rgba(167, 48, 48, 0.28) !important;
      background: rgba(255, 236, 236, 0.88) !important;
      color: #7f1d1d !important;
    }

    .card {
      width: 100% !important;
      max-width: none !important;
      height: auto !important;
      margin: 0 !important;
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      padding: clamp(16px, 1.8vw, 24px) !important;
      backdrop-filter: none !important;
      box-sizing: border-box;
    }

    .canvas-wrap {
      width: 100% !important;
      height: auto !important;
      min-height: 0 !important;
    }

    #chart-wrap {
      width: 100% !important;
      min-height: min(72vh, 740px);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.34);
      border: 1px solid var(--custom-grid, var(--line));
      padding: clamp(8px, 1.4vw, 16px);
      box-sizing: border-box;
    }

    #chart-wrap canvas,
    canvas#chart-root,
    #chart-root {
      width: 100% !important;
      height: max(280px, min(var(--requested-plot-height), calc(100vh - 220px))) !important;
      display: block;
    }

    #chartCanvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    @media (max-width: 700px) {
      :root {
        --requested-card-width: calc(100vw - 24px);
      }

      #chart-wrap canvas,
      canvas#chart-root,
      #chart-root {
        height: max(240px, min(var(--requested-plot-height), calc(100vh - 180px))) !important;
      }
    }
  </style>
</head>
<body><div class="page-shell"><div class="chart-card">
  <div class="wrap">
    <div class="card">
      <div id="transport" class="transport"></div>
      <div id="title" class="title"></div>
      <div class="content">
        <canvas id="chart-root"></canvas>
        <div id="error" class="msg" style="display:none;"></div>
      </div>
    </div>
  </div>

  <script>
    (async function () {
      const spec = {"request_version":"1.0","output":{"format":"html","container_id":"chart-root","width":1280,"height":760},"chart":{"type":"bar","title":"{species} {from_year}-{to_year} Survey by Year","show_legend":true,"x_axis_label":"Year","y_axis_label":"Abundance","stacked":true},"data_source":{"proc_schema":"ri","proc_name":"FWPSpeciesCountByYear","endpoint":"http://localhost:3000/api/stored-proc","http_method":"GET","proc_params":{"from_year":"2024","to_year":"2026"},"result_set_index":0},"mapping":{"categoryField":"year","valueField":"abundance","groupField":"species"},"options":{"stacked":true,"indexAxis":"x"},"appearance":{"page_background":"linear-gradient(145deg, #d7e7df, #bfd6ce)","card_background":"rgba(243,250,246,0.82)","title_color":"#184f3f","text_color":"#2f6f5d","grid_color":"rgba(24,79,63,0.2)","x_axis_label_color":"#184f3f","x_axis_value_color":"#2f6f5d","y_axis_label_color":"#184f3f","y_axis_value_color":"#2f6f5d","legend_text_color":"#184f3f","series_colors":["#4e79a7","#f28e2b","#e15759","#76b7b2"]}};

      const errorEl = document.getElementById('error');
      const transportEl = document.getElementById('transport');
      const titleEl = document.getElementById('title');

      const appearance = spec.appearance || {};
      if (appearance.page_background) document.documentElement.style.setProperty('--page-bg', appearance.page_background);
      if (appearance.card_background) document.documentElement.style.setProperty('--card-bg', appearance.card_background);
      if (appearance.title_color) document.documentElement.style.setProperty('--title-color', appearance.title_color);
      if (appearance.text_color) document.documentElement.style.setProperty('--text-color', appearance.text_color);
      if (appearance.grid_color) document.documentElement.style.setProperty('--grid-color', appearance.grid_color);

      function showError(msg) {
        errorEl.style.display = 'block';
        errorEl.textContent = msg;
      }

      function tpl(str, row, params) {
        if (!str || typeof str !== 'string') return str;
        return str.replace(/\{([^}]+)\}/g, (_, k) => {
          if (row && row[k] !== undefined && row[k] !== null) return String(row[k]);
          if (params && params[k] !== undefined && params[k] !== null) return String(params[k]);
          return '';
        });
      }

      const ds = spec.data_source || {};
      const endpoint = ds.endpoint || '/api/stored-proc';
      const method = (ds.http_method || 'POST').toUpperCase();
      const proc_schema = ds.proc_schema;
      const proc_name = ds.proc_name;
      const proc_params = ds.proc_params || {};
      const result_set_index = ds.result_set_index ?? 0;

      transportEl.textContent = `Endpoint: http://localhost:3000/api/stored-proc | Method: GET | Proc: FWPSpeciesCountByYear | Request URL: /api/stored-proc?proc_schema=ri&proc_name=FWPSpeciesCountByYear&result_set_index=0&proc_params.from_year=2024&proc_params.to_year=2026`;

      titleEl.textContent = tpl(spec.chart?.title || '', null, proc_params);

      let url = endpoint;
      const fetchOptions = { method, headers: {} };

      if (method === 'GET') {
        const q = new URLSearchParams();
        if (proc_schema !== undefined) q.append('proc_schema', proc_schema);
        if (proc_name !== undefined) q.append('proc_name', proc_name);
        if (proc_params !== undefined) q.append('proc_params', JSON.stringify(proc_params));
        if (result_set_index !== undefined) q.append('result_set_index', String(result_set_index));
        url += (url.includes('?') ? '&' : '?') + q.toString();
      } else {
        fetchOptions.headers['Content-Type'] = 'application/json';
        fetchOptions.body = JSON.stringify({ proc_schema, proc_name, proc_params, result_set_index });
      }

      let rows;
      try {
        const res = await fetch(url, fetchOptions);
        if (!res.ok) {
          showError(`Fetch failed: status ${res.status} (${method} ${endpoint})`);
          return;
        }
        const payload = await res.json();
        if (Array.isArray(payload)) rows = payload;
        else if (Array.isArray(payload?.rows)) rows = payload.rows;
        else if (Array.isArray(payload?.data)) rows = payload.data;
        else if (Array.isArray(payload?.result)) rows = payload.result;
        else rows = [];
      } catch (e) {
        showError(`Fetch failed: status network_error (${method} ${endpoint})`);
        return;
      }

      const mapping = spec.mapping || {};
      const chartType = spec.chart?.type || 'bar';
      const requiredFields = [];
      if (mapping.categoryField) requiredFields.push(mapping.categoryField);
      if (mapping.valueField) requiredFields.push(mapping.valueField);
      if (mapping.groupField) requiredFields.push(mapping.groupField);

      const rowWithAll = rows.find(r => requiredFields.every(f => Object.prototype.hasOwnProperty.call(r, f)));
      if (!rowWithAll) {
        const missing = requiredFields.filter(f => !rows.some(r => Object.prototype.hasOwnProperty.call(r, f)));
        showError(`Missing required mapped field(s): ${missing.join(', ') || requiredFields.join(', ')}`);
        return;
      }

      const categoryField = mapping.categoryField;
      const valueField = mapping.valueField;
      const groupField = mapping.groupField;

      const categories = [...new Set(rows.map(r => r[categoryField]))];
      const groups = groupField ? [...new Set(rows.map(r => r[groupField]))] : ['Series'];

      const colors = Array.isArray(appearance.series_colors) && appearance.series_colors.length ? appearance.series_colors : ['#4e79a7'];

      const datasets = groups.map((g, i) => {
        const color = colors[i % colors.length];
        const data = categories.map(c => {
          const hit = rows.find(r => r[categoryField] === c && (groupField ? r[groupField] === g : true));
          const v = hit ? Number(hit[valueField]) : 0;
          return Number.isFinite(v) ? v : 0;
        });
        return {
          label: String(g),
          data,
          borderColor: color,
          backgroundColor: color,
          borderWidth: 1
        };
      });

      const ctx = document.getElementById(spec.output?.container_id || 'chart-root').getContext('2d');

      const xAxisLabelColor = appearance.x_axis_label_color || appearance.axis_color || appearance.text_color || '#333';
      const xAxisValueColor = appearance.x_axis_value_color || appearance.axis_color || appearance.text_color || '#333';
      const yAxisLabelColor = appearance.y_axis_label_color || appearance.axis_color || appearance.text_color || '#333';
      const yAxisValueColor = appearance.y_axis_value_color || appearance.axis_color || appearance.text_color || '#333';
      const gridColor = appearance.grid_color || 'rgba(0,0,0,0.1)';
      const legendTextColor = appearance.legend_text_color || appearance.text_color || '#333';

      new Chart(ctx, {
        type: chartType,
        data: { labels: categories, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          indexAxis: spec.options?.indexAxis || 'x',
          scales: {
            x: {
              stacked: !!(spec.chart?.stacked || spec.options?.stacked),
              title: {
                display: !!spec.chart?.x_axis_label,
                text: spec.chart?.x_axis_label || '',
                color: xAxisLabelColor
              },
              ticks: { color: xAxisValueColor },
              grid: { color: gridColor }
            },
            y: {
              stacked: !!(spec.chart?.stacked || spec.options?.stacked),
              title: {
                display: !!spec.chart?.y_axis_label,
                text: spec.chart?.y_axis_label || '',
                color: yAxisLabelColor
              },
              ticks: { color: yAxisValueColor },
              grid: { color: gridColor }
            }
          },
          plugins: {
            legend: {
              display: spec.chart?.show_legend !== false,
              labels: { color: legendTextColor }
            },
            title: { display: false }
          }
        }
      });
    })();
  </script>
</div></div></body>
</html>
