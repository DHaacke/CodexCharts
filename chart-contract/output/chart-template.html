<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{title}</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;400&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at top left, #e6f4ea 60%, #cbe7e1 100%);
      font-family: 'Nunito', Arial, sans-serif;
      color: #1f2937;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 8px;
    }
    .chart-card {
      background: #f8fafb;
      border-radius: 24px;
      box-shadow: 0 8px 32px 0 rgba(44, 62, 80, 0.12), 0 1.5px 4px 0 rgba(44, 62, 80, 0.08);
      padding: 32px 32px 24px 32px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      margin: 0 0 18px 0;
      color: #234b2c;
      letter-spacing: 0.01em;
      text-shadow: 0 2px 8px rgba(44, 62, 80, 0.08);
    }
    .chart-meta {
      font-size: 1.1rem;
      color: #4b5563;
      margin-bottom: 18px;
    }
    #chart-root {
      width: 100%;
      min-height: 600px;
      background: transparent;
      border-radius: 18px;
      box-shadow: 0 2px 12px 0 rgba(44, 62, 80, 0.07);
      padding: 0;
      margin: 0 auto 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @media (max-width: 700px) {
      .chart-card {
        padding: 16px 4px 12px 4px;
        border-radius: 14px;
      }
      h1 {
        font-size: 1.3rem;
      }
      #chart-root {
        min-height: 320px;
        border-radius: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="chart-card">
    <h1>{title}</h1>
    <div class="chart-meta">{meta}</div>
    <div id="chart-root">{chart}</div>
  </div>
</body>
</html>
