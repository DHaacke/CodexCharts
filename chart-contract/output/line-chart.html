<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chart Renderer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --page-bg: linear-gradient(145deg, #d7e7df, #bfd6ce);
      --card-bg: #f3faf6;
      --title-color: #184f3f;
      --text-color: #2f6f5d;
      --grid-color: rgba(24,79,63,0.2);
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--page-bg);
      color: var(--text-color);
    }
    .wrap {
      width: 1180px;
      height: 680px;
      margin: 12px auto;
      box-sizing: border-box;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      padding: 10px 14px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .transport {
      font-size: 12px;
      line-height: 1.3;
      color: var(--text-color);
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 8px;
      padding: 6px 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chart-title {
      margin: 0;
      font-size: 20px;
      color: var(--title-color);
      font-weight: 700;
    }
    .canvas-holder {
      position: relative;
      flex: 1;
      min-height: 0;
    }
    #chart-root {
      width: 100%;
      height: 100%;
    }
    .error {
      color: #b00020;
      background: #ffe9ec;
      border: 1px solid #ffb8c2;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      white-space: pre-wrap;
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet" />
  <style id="chart-theme-injected">
    :root {
      --custom-page-bg: linear-gradient(145deg, #d7e7df, #bfd6ce); --custom-card-bg: #f3faf6; --custom-title: #184f3f; --custom-text: #2f6f5d; --custom-grid: rgba(24,79,63,0.2); --custom-x-axis-label: #184f3f; --custom-x-axis-value: #2f6f5d; --custom-y-axis-label: #184f3f; --custom-y-axis-value: #2f6f5d; --custom-legend-text: #184f3f;
      --requested-card-width: 1180px; --requested-card-height: 680px; --requested-plot-height: calc(680px - 156px);
      --bg-a: #d7e7df;
      --bg-b: #bfd6ce;
      --card: rgba(243, 250, 246, 0.82);
      --ink: #184f3f;
      --ink-soft: #2f6f5d;
      --line: rgba(24, 79, 63, 0.2);
      --shadow: 0 28px 60px rgba(23, 58, 52, 0.22);      --custom-x-axis-label: #184f3f;
      --custom-x-axis-value: #2f6f5d;
      --custom-y-axis-label: #184f3f;
      --custom-y-axis-value: #2f6f5d;
      --custom-legend-text: #184f3f;    }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Source Sans 3", "Segoe UI", sans-serif !important;
      color: var(--ink);
      display: block !important;
      align-items: initial !important;
      justify-content: initial !important;
      background:
        radial-gradient(circle at 8% 0%, rgba(255, 255, 255, 0.52), transparent 38%),
        radial-gradient(circle at 90% 100%, rgba(255, 255, 255, 0.4), transparent 35%),
        var(--custom-page-bg, linear-gradient(145deg, var(--bg-a), var(--bg-b))) !important;
      padding: clamp(16px, 2.5vw, 34px);
      box-sizing: border-box;
    }

    .page-shell {
      width: min(var(--requested-card-width), calc(100vw - 32px));
      max-width: none;
      margin: 0 auto;
    }

    .wrap {
      max-width: none !important;
      width: 100%;
      margin: 0 !important;
      padding: 0 !important;
    }

    .chart-card {
      background: var(--custom-card-bg, var(--card));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      min-height: min(var(--requested-card-height), calc(100vh - 32px));
      padding: clamp(14px, 2.5vw, 28px);
      backdrop-filter: blur(2px);
      box-sizing: border-box;
    }

    h1, h2, h3, .chart-title, canvas + div {
      font-family: "Merriweather", Georgia, serif !important;
      color: var(--custom-title, var(--ink)) !important;
    }

    #transport-summary {
      font-size: 13px !important;
      font-weight: 600;
      color: var(--custom-text, var(--ink-soft)) !important;
      background: rgba(255, 255, 255, 0.7) !important;
      border: 1px solid var(--line) !important;
      border-radius: 10px !important;
      padding: 8px 12px !important;
      margin-bottom: 12px !important;
    }

    #error {
      border-radius: 10px !important;
      border: 1px solid rgba(167, 48, 48, 0.28) !important;
      background: rgba(255, 236, 236, 0.88) !important;
      color: #7f1d1d !important;
    }

    .card {
      width: 100% !important;
      max-width: none !important;
      height: auto !important;
      margin: 0 !important;
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      padding: clamp(16px, 1.8vw, 24px) !important;
      backdrop-filter: none !important;
      box-sizing: border-box;
    }

    .canvas-wrap {
      width: 100% !important;
      height: auto !important;
      min-height: 0 !important;
    }

    #chart-wrap {
      width: 100% !important;
      min-height: min(72vh, 740px);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.34);
      border: 1px solid var(--custom-grid, var(--line));
      padding: clamp(8px, 1.4vw, 16px);
      box-sizing: border-box;
    }

    #chart-wrap canvas,
    canvas#chart-root,
    #chart-root {
      width: 100% !important;
      height: max(280px, min(var(--requested-plot-height), calc(100vh - 220px))) !important;
      display: block;
    }

    #chartCanvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    @media (max-width: 700px) {
      :root {
        --requested-card-width: calc(100vw - 24px);
      }

      #chart-wrap canvas,
      canvas#chart-root,
      #chart-root {
        height: max(240px, min(var(--requested-plot-height), calc(100vh - 180px))) !important;
      }
    }
  </style>
</head>
<body><div class="page-shell"><div class="chart-card">
  <div class="wrap">
    <div id="transport" class="transport"></div>
    <h1 id="title" class="chart-title"></h1>
    <div class="canvas-holder">
      <canvas id="chart-root"></canvas>
      <div id="error" class="error" style="display:none;"></div>
    </div>
  </div>

  <script>
    (async function () {
      const spec = {"request_version":"1.0","output":{"format":"html","container_id":"chart-root","width":1180,"height":680},"chart":{"type":"line","title":"{species} {from_year}-{to_year} Survey by Year","show_legend":true,"x_axis_label":"Year","y_axis_label":"Abundance","stacked":false},"data_source":{"proc_schema":"ri","proc_name":"FWPSpeciesCountByYear","endpoint":"http://localhost:3000/api/stored-proc","http_method":"GET","proc_params":{"from_year":"2024","to_year":"2026"},"result_set_index":0},"mapping":{"xField":"year","yField":"abundance","groupField":"species"},"options":{"tension":0.2,"pointRadius":2},"appearance":{"page_background":"linear-gradient(145deg, #d7e7df, #bfd6ce)","card_background":"#f3faf6","title_color":"#184f3f","text_color":"#2f6f5d","grid_color":"rgba(24,79,63,0.2)","x_axis_label_color":"#184f3f","x_axis_value_color":"#2f6f5d","y_axis_label_color":"#184f3f","y_axis_value_color":"#2f6f5d","legend_text_color":"#184f3f","series_colors":["#2b8cbe","#f28e2b","#59a14f","#af7aa1"]}};

      const errorEl = document.getElementById('error');
      const transportEl = document.getElementById('transport');
      const titleEl = document.getElementById('title');

      function showError(msg) {
        errorEl.style.display = 'block';
        errorEl.textContent = msg;
      }

      function applyTemplate(template, row, fallback) {
        if (!template || typeof template !== 'string') return '';
        return template.replace(/\{([^}]+)\}/g, (_, key) => {
          if (row && row[key] != null) return String(row[key]);
          if (fallback && fallback[key] != null) return String(fallback[key]);
          return '';
        }).trim();
      }

      const appearance = spec.appearance || {};
      if (appearance.page_background) document.documentElement.style.setProperty('--page-bg', appearance.page_background);
      if (appearance.card_background) document.documentElement.style.setProperty('--card-bg', appearance.card_background);
      if (appearance.title_color) document.documentElement.style.setProperty('--title-color', appearance.title_color);
      if (appearance.text_color) document.documentElement.style.setProperty('--text-color', appearance.text_color);
      if (appearance.grid_color) document.documentElement.style.setProperty('--grid-color', appearance.grid_color);

      const ds = spec.data_source || {};
      const endpoint = ds.endpoint || '/api/stored-proc';
      const method = (ds.http_method || 'POST').toUpperCase();
      const proc_schema = ds.proc_schema;
      const proc_name = ds.proc_name;
      const proc_params = ds.proc_params || {};
      const result_set_index = ds.result_set_index ?? 0;

      transportEl.textContent = `Endpoint: http://localhost:3000/api/stored-proc | Method: GET | Proc: FWPSpeciesCountByYear | Request URL: /api/stored-proc?proc_schema=ri&proc_name=FWPSpeciesCountByYear&result_set_index=0&proc_params.from_year=2024&proc_params.to_year=2026`;

      const titleText = applyTemplate(spec.chart?.title || '', {}, proc_params) || '';
      titleEl.textContent = titleText;

      let url = endpoint;
      let fetchOptions = { method, headers: {} };

      if (method === 'GET') {
        const q = new URLSearchParams();
        q.set('proc_schema', proc_schema ?? '');
        q.set('proc_name', proc_name ?? '');
        q.set('result_set_index', String(result_set_index));
        q.set('proc_params', JSON.stringify(proc_params));
        url += (url.includes('?') ? '&' : '?') + q.toString();
      } else {
        fetchOptions.headers['Content-Type'] = 'application/json';
        fetchOptions.body = JSON.stringify({ proc_schema, proc_name, proc_params, result_set_index });
      }

      let rows;
      try {
        const res = await fetch(url, fetchOptions);
        if (!res.ok) {
          showError(`Fetch failed: status ${res.status} (${res.statusText}) via ${method} ${endpoint}`);
          return;
        }
        const payload = await res.json();
        if (Array.isArray(payload)) rows = payload;
        else if (Array.isArray(payload?.data)) rows = payload.data;
        else if (Array.isArray(payload?.rows)) rows = payload.rows;
        else if (Array.isArray(payload?.result)) rows = payload.result;
        else rows = [];
      } catch (e) {
        showError(`Fetch failed: ${e.message} via ${method} ${endpoint}`);
        return;
      }

      const map = spec.mapping || {};
      const required = [];
      if (map.xField) required.push(map.xField);
      if (map.yField) required.push(map.yField);
      if (map.groupField) required.push(map.groupField);

      const validRow = rows.find(r => required.every(f => Object.prototype.hasOwnProperty.call(r, f)));
      if (!validRow) {
        const missing = required.filter(f => !rows.some(r => Object.prototype.hasOwnProperty.call(r, f)));
        showError(`Missing required mapped field(s): ${missing.join(', ')}`);
        return;
      }

      const xField = map.xField;
      const yField = map.yField;
      const groupField = map.groupField;

      const filtered = rows.filter(r =>
        Object.prototype.hasOwnProperty.call(r, xField) &&
        Object.prototype.hasOwnProperty.call(r, yField) &&
        Object.prototype.hasOwnProperty.call(r, groupField)
      );

      const xSet = new Set();
      filtered.forEach(r => xSet.add(String(r[xField])));
      const xLabels = Array.from(xSet).sort((a,b) => {
        const na = Number(a), nb = Number(b);
        if (!Number.isNaN(na) && !Number.isNaN(nb)) return na - nb;
        return a.localeCompare(b);
      });

      const groups = Array.from(new Set(filtered.map(r => String(r[groupField]))));
      const seriesColors = Array.isArray(appearance.series_colors) && appearance.series_colors.length ? appearance.series_colors : [];
      const datasets = groups.map((g, idx) => {
        const pointsByX = new Map();
        filtered.forEach(r => {
          if (String(r[groupField]) === g) pointsByX.set(String(r[xField]), Number(r[yField]));
        });
        const data = xLabels.map(x => pointsByX.has(x) ? pointsByX.get(x) : null);
        const c = seriesColors.length ? seriesColors[idx % seriesColors.length] : undefined;
        return {
          label: g,
          data,
          fill: false,
          tension: spec.options?.tension ?? 0,
          pointRadius: spec.options?.pointRadius ?? 3,
          borderColor: c,
          backgroundColor: c
        };
      });

      const ctx = document.getElementById(spec.output?.container_id || 'chart-root').getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: { labels: xLabels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: !!spec.chart?.show_legend,
              labels: {
                color: appearance.legend_text_color || appearance.text_color || undefined
              }
            },
            title: { display: false },
            tooltip: {
              callbacks: {
                title: (items) => items?.[0]?.label ?? ''
              }
            }
          },
          scales: {
            x: {
              stacked: !!spec.chart?.stacked,
              title: {
                display: !!spec.chart?.x_axis_label,
                text: spec.chart?.x_axis_label || '',
                color: appearance.x_axis_label_color || undefined
              },
              ticks: {
                color: appearance.x_axis_value_color || undefined
              },
              grid: {
                color: appearance.grid_color || undefined
              }
            },
            y: {
              stacked: !!spec.chart?.stacked,
              title: {
                display: !!spec.chart?.y_axis_label,
                text: spec.chart?.y_axis_label || '',
                color: appearance.y_axis_label_color || undefined
              },
              ticks: {
                color: appearance.y_axis_value_color || undefined
              },
              grid: {
                color: appearance.grid_color || undefined
              }
            }
          }
        }
      });
    })();
  </script>
</div></div></body>
</html>
