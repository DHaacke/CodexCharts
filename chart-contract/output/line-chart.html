<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chart Renderer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --page-bg: linear-gradient(145deg, #d7e7df, #bfd6ce);
      --card-bg: rgba(243,250,246,0.82);
      --title-color: #184f3f;
      --text-color: #2f6f5d;
      --grid-color: rgba(24,79,63,0.2);
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--page-bg);
      color: var(--text-color);
    }
    .wrap {
      width: 1180px;
      margin: 18px auto;
    }
    .transport {
      font-size: 12px;
      padding: 8px 10px;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 8px;
      background: rgba(255,255,255,0.65);
      color: #123a2f;
      margin-bottom: 10px;
      word-break: break-all;
    }
    .card {
      background: var(--card-bg);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      border: 1px solid rgba(255,255,255,0.55);
      padding: 14px 16px 12px;
    }
    .title {
      margin: 0 0 8px 0;
      font-weight: 700;
      color: var(--title-color);
      font-size: 20px;
    }
    .error {
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #ffe9e9;
      color: #8a1f1f;
      border: 1px solid #efb0b0;
      font-size: 13px;
      white-space: pre-wrap;
    }
    #chart-root {
      width: 1180px;
      height: 680px;
      position: relative;
    }
    canvas {
      width: 100% !important;
      height: 620px !important;
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet" />
  <style id="chart-theme-injected">
    :root {
      --custom-page-bg: linear-gradient(145deg, #d7e7df, #bfd6ce); --custom-card-bg: rgba(243,250,246,0.82); --custom-title: #184f3f; --custom-text: #2f6f5d; --custom-grid: rgba(24,79,63,0.2); --custom-x-axis-label: #184f3f; --custom-x-axis-value: #2f6f5d; --custom-y-axis-label: #184f3f; --custom-y-axis-value: #2f6f5d; --custom-legend-text: #184f3f;
      --requested-card-width: 1180px; --requested-card-height: 680px; --requested-plot-height: calc(680px - 156px);
      --bg-a: #d7e7df;
      --bg-b: #bfd6ce;
      --card: rgba(243, 250, 246, 0.82);
      --ink: #184f3f;
      --ink-soft: #2f6f5d;
      --line: rgba(24, 79, 63, 0.2);
      --shadow: 0 28px 60px rgba(23, 58, 52, 0.22);      --custom-x-axis-label: #184f3f;
      --custom-x-axis-value: #2f6f5d;
      --custom-y-axis-label: #184f3f;
      --custom-y-axis-value: #2f6f5d;
      --custom-legend-text: #184f3f;    }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Source Sans 3", "Segoe UI", sans-serif !important;
      color: var(--ink);
      display: block !important;
      align-items: initial !important;
      justify-content: initial !important;
      background:
        radial-gradient(circle at 8% 0%, rgba(255, 255, 255, 0.52), transparent 38%),
        radial-gradient(circle at 90% 100%, rgba(255, 255, 255, 0.4), transparent 35%),
        var(--custom-page-bg, linear-gradient(145deg, var(--bg-a), var(--bg-b))) !important;
      padding: clamp(16px, 2.5vw, 34px);
      box-sizing: border-box;
    }

    .page-shell {
      width: min(var(--requested-card-width), calc(100vw - 32px));
      max-width: none;
      margin: 0 auto;
    }

    .wrap {
      max-width: none !important;
      width: 100%;
      margin: 0 !important;
      padding: 0 !important;
    }

    .chart-card {
      background: var(--custom-card-bg, var(--card));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      min-height: min(var(--requested-card-height), calc(100vh - 32px));
      padding: clamp(14px, 2.5vw, 28px);
      backdrop-filter: blur(2px);
      box-sizing: border-box;
    }

    h1, h2, h3, .chart-title, canvas + div {
      font-family: "Merriweather", Georgia, serif !important;
      color: var(--custom-title, var(--ink)) !important;
    }

    #transport-summary {
      font-size: 13px !important;
      font-weight: 600;
      color: var(--custom-text, var(--ink-soft)) !important;
      background: rgba(255, 255, 255, 0.7) !important;
      border: 1px solid var(--line) !important;
      border-radius: 10px !important;
      padding: 8px 12px !important;
      margin-bottom: 12px !important;
    }

    #error {
      border-radius: 10px !important;
      border: 1px solid rgba(167, 48, 48, 0.28) !important;
      background: rgba(255, 236, 236, 0.88) !important;
      color: #7f1d1d !important;
    }

    .card {
      width: 100% !important;
      max-width: none !important;
      height: auto !important;
      margin: 0 !important;
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      padding: clamp(16px, 1.8vw, 24px) !important;
      backdrop-filter: none !important;
      box-sizing: border-box;
    }

    .canvas-wrap {
      width: 100% !important;
      height: auto !important;
      min-height: 0 !important;
    }

    #chart-wrap {
      width: 100% !important;
      min-height: min(72vh, 740px);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.34);
      border: 1px solid var(--custom-grid, var(--line));
      padding: clamp(8px, 1.4vw, 16px);
      box-sizing: border-box;
    }

    #chart-wrap canvas,
    canvas#chart-root,
    #chart-root {
      width: 100% !important;
      height: max(280px, min(var(--requested-plot-height), calc(100vh - 220px))) !important;
      display: block;
    }

    #chartCanvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    @media (max-width: 700px) {
      :root {
        --requested-card-width: calc(100vw - 24px);
      }

      #chart-wrap canvas,
      canvas#chart-root,
      #chart-root {
        height: max(240px, min(var(--requested-plot-height), calc(100vh - 180px))) !important;
      }
    }
  </style>
</head>
<body><div class="page-shell"><div class="chart-card">
  <div class="wrap">
    <div id="transport" class="transport"></div>
    <div class="card">
      <h2 id="chartTitle" class="title"></h2>
      <div id="chart-root">
        <canvas id="chartCanvas"></canvas>
      </div>
      <div id="error" class="error" style="display:none;"></div>
    </div>
  </div>

  <script>
    (async function () {
      const request = {"request_version":"1.0","output":{"format":"html","container_id":"chart-root","width":1180,"height":680},"chart":{"type":"line","title":"{species} {from_year}-{to_year} Survey by Year","show_legend":true,"x_axis_label":"Year","y_axis_label":"Abundance","stacked":false},"data_source":{"proc_schema":"ri","proc_name":"FWPSpeciesCountByYear","endpoint":"http://localhost:3000/api/stored-proc","http_method":"GET","proc_params":{"from_year":"2024","to_year":"2026"},"result_set_index":0},"mapping":{"xField":"year","yField":"abundance","groupField":"species"},"options":{"tension":0.2,"pointRadius":2},"appearance":{"page_background":"linear-gradient(145deg, #d7e7df, #bfd6ce)","card_background":"rgba(243,250,246,0.82)","title_color":"#184f3f","text_color":"#2f6f5d","grid_color":"rgba(24,79,63,0.2)","x_axis_label_color":"#184f3f","x_axis_value_color":"#2f6f5d","y_axis_label_color":"#184f3f","y_axis_value_color":"#2f6f5d","legend_text_color":"#184f3f","series_colors":["#2b8cbe","#f28e2b","#59a14f","#af7aa1"]}};

      const ds = request.data_source || {};
      const mapping = request.mapping || {};
      const appearance = request.appearance || {};
      const chartCfg = request.chart || {};
      const opts = request.options || {};

      const endpoint = ds.endpoint || "/api/stored-proc";
      const method = (ds.http_method || "POST").toUpperCase();

      const transportEl = document.getElementById("transport");
      transportEl.textContent = `Endpoint: http://localhost:3000/api/stored-proc | Method: GET | Proc: FWPSpeciesCountByYear | Request URL: /api/stored-proc?proc_schema=ri&proc_name=FWPSpeciesCountByYear&result_set_index=0&proc_params.from_year=2024&proc_params.to_year=2026`;

      const errorEl = document.getElementById("error");
      const showError = (msg) => {
        errorEl.style.display = "block";
        errorEl.textContent = msg;
      };

      if (appearance.page_background) document.documentElement.style.setProperty("--page-bg", appearance.page_background);
      if (appearance.card_background) document.documentElement.style.setProperty("--card-bg", appearance.card_background);
      if (appearance.title_color) document.documentElement.style.setProperty("--title-color", appearance.title_color);
      if (appearance.text_color) document.documentElement.style.setProperty("--text-color", appearance.text_color);
      if (appearance.grid_color) document.documentElement.style.setProperty("--grid-color", appearance.grid_color);

      let url = endpoint;
      const payload = {
        proc_schema: ds.proc_schema,
        proc_name: ds.proc_name,
        proc_params: ds.proc_params,
        result_set_index: ds.result_set_index
      };

      const fetchOptions = { method, headers: {} };

      if (method === "GET") {
        const params = new URLSearchParams();
        params.set("proc_schema", ds.proc_schema ?? "");
        params.set("proc_name", ds.proc_name ?? "");
        params.set("proc_params", JSON.stringify(ds.proc_params ?? {}));
        params.set("result_set_index", String(ds.result_set_index ?? 0));
        url += (url.includes("?") ? "&" : "?") + params.toString();
      } else {
        fetchOptions.headers["Content-Type"] = "application/json";
        fetchOptions.body = JSON.stringify(payload);
      }

      let rows;
      try {
        const res = await fetch(url, fetchOptions);
        if (!res.ok) {
          showError(`Fetch failed: status ${res.status} (${method} ${endpoint})`);
          return;
        }
        const data = await res.json();
        rows = Array.isArray(data) ? data : (Array.isArray(data?.rows) ? data.rows : (Array.isArray(data?.data) ? data.data : []));
      } catch (e) {
        showError(`Fetch failed: status network_error (${method} ${endpoint})`);
        return;
      }

      const requiredFields = [];
      if (mapping.xField) requiredFields.push(mapping.xField);
      if (mapping.yField) requiredFields.push(mapping.yField);
      if (mapping.groupField) requiredFields.push(mapping.groupField);

      const hasValidRow = rows.some(r => requiredFields.every(f => Object.prototype.hasOwnProperty.call(r, f)));
      if (!hasValidRow) {
        const missing = requiredFields.filter(f => !rows.some(r => Object.prototype.hasOwnProperty.call(r, f)));
        showError(`Missing required mapped field(s): ${missing.join(", ")}`);
        return;
      }

      const applyTemplate = (tpl, row, fallback) =>
        String(tpl).replace(/\{([^}]+)\}/g, (_, key) => {
          if (row && row[key] != null) return row[key];
          if (fallback && fallback[key] != null) return fallback[key];
          return "";
        });

      const titleText = applyTemplate(chartCfg.title || "", rows[0] || {}, ds.proc_params || {});
      document.getElementById("chartTitle").textContent = titleText;

      const xField = mapping.xField;
      const yField = mapping.yField;
      const gField = mapping.groupField;

      const groups = new Map();
      for (const r of rows) {
        if (!Object.prototype.hasOwnProperty.call(r, xField) || !Object.prototype.hasOwnProperty.call(r, yField) || !Object.prototype.hasOwnProperty.call(r, gField)) continue;
        const g = r[gField];
        if (!groups.has(g)) groups.set(g, []);
        groups.get(g).push(r);
      }

      const xSet = new Set();
      groups.forEach(arr => arr.forEach(r => xSet.add(r[xField])));
      const xLabels = Array.from(xSet).sort((a, b) => (a > b ? 1 : a < b ? -1 : 0));

      const colors = Array.isArray(appearance.series_colors) && appearance.series_colors.length ? appearance.series_colors : ["#3366cc","#dc3912","#ff9900","#109618","#990099"];

      const datasets = Array.from(groups.entries()).map(([g, arr], i) => {
        const map = new Map(arr.map(r => [r[xField], r[yField]]));
        const data = xLabels.map(x => map.has(x) ? map.get(x) : null);
        const c = colors[i % colors.length];
        return {
          label: String(g),
          data,
          borderColor: c,
          backgroundColor: c,
          fill: false,
          tension: typeof opts.tension === "number" ? opts.tension : 0,
          pointRadius: typeof opts.pointRadius === "number" ? opts.pointRadius : 3
        };
      });

      const ctx = document.getElementById("chartCanvas").getContext("2d");
      new Chart(ctx, {
        type: "line",
        data: { labels: xLabels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: !!chartCfg.show_legend,
              labels: {
                color: appearance.legend_text_color || undefined
              }
            },
            tooltip: {
              callbacks: {}
            }
          },
          scales: {
            x: {
              stacked: !!chartCfg.stacked,
              title: {
                display: !!chartCfg.x_axis_label,
                text: chartCfg.x_axis_label || "",
                color: appearance.x_axis_label_color || undefined
              },
              ticks: {
                color: appearance.x_axis_value_color || undefined
              },
              grid: {
                color: appearance.grid_color || undefined
              }
            },
            y: {
              stacked: !!chartCfg.stacked,
              title: {
                display: !!chartCfg.y_axis_label,
                text: chartCfg.y_axis_label || "",
                color: appearance.y_axis_label_color || undefined
              },
              ticks: {
                color: appearance.y_axis_value_color || undefined
              },
              grid: {
                color: appearance.grid_color || undefined
              }
            }
          }
        }
      });
    })();
  </script>
</div></div></body>
</html>
