<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chart Renderer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <style>
    :root {
      --page-bg: linear-gradient(145deg, #d7e7df, #bfd6ce);
      --card-bg: #f3faf6;
      --text: #2f6f5d;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--page-bg);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }
    .wrap {
      width: 1280px;
      height: 720px;
      margin: 0 auto;
      box-sizing: border-box;
      padding: 12px;
    }
    .transport-summary {
      font-size: 12px;
      line-height: 1.4;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 6px;
      padding: 6px 10px;
      margin-bottom: 8px;
      color: #1f3f35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card {
      width: 100%;
      height: calc(100% - 40px);
      background: var(--card-bg);
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      padding: 10px 14px 14px 14px;
      box-sizing: border-box;
      position: relative;
    }
    #error {
      color: #b00020;
      background: #ffe9ee;
      border: 1px solid #f3b6c3;
      border-radius: 6px;
      padding: 10px;
      margin: 8px 0;
      display: none;
      font-size: 13px;
    }
    #chart-root {
      position: relative;
      width: 100%;
      height: 100%;
    }
    canvas {
      width: 100% !important;
      height: 100% !important;
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet" />
  <style id="chart-theme-injected">
    :root {
      --custom-page-bg: linear-gradient(145deg, #d7e7df, #bfd6ce); --custom-card-bg: #f3faf6; --custom-title: #d7e7df; --custom-text: #2f6f5d; --custom-grid: rgba(24,79,63,0.2); --custom-x-axis-label: #FFFFFF; --custom-x-axis-value: #2f6f5d; --custom-y-axis-label: #FFFFFF; --custom-y-axis-value: #2f6f5d; --custom-legend-text: #FFFFFF;
      --requested-card-width: 1280px; --requested-card-height: 720px; --requested-plot-height: calc(720px - 156px);
      --bg-a: #d7e7df;
      --bg-b: #bfd6ce;
      --card: rgba(243, 250, 246, 0.82);
      --ink: #184f3f;
      --ink-soft: #2f6f5d;
      --line: rgba(24, 79, 63, 0.2);
      --shadow: 0 28px 60px rgba(23, 58, 52, 0.22);      --custom-x-axis-label: #184f3f;
      --custom-x-axis-value: #2f6f5d;
      --custom-y-axis-label: #184f3f;
      --custom-y-axis-value: #2f6f5d;
      --custom-legend-text: #184f3f;    }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Source Sans 3", "Segoe UI", sans-serif !important;
      color: var(--ink);
      display: block !important;
      align-items: initial !important;
      justify-content: initial !important;
      background:
        radial-gradient(circle at 8% 0%, rgba(255, 255, 255, 0.52), transparent 38%),
        radial-gradient(circle at 90% 100%, rgba(255, 255, 255, 0.4), transparent 35%),
        var(--custom-page-bg, linear-gradient(145deg, var(--bg-a), var(--bg-b))) !important;
      padding: clamp(16px, 2.5vw, 34px);
      box-sizing: border-box;
    }

    .page-shell {
      width: min(var(--requested-card-width), calc(100vw - 32px));
      max-width: none;
      margin: 0 auto;
    }

    .wrap {
      max-width: none !important;
      width: 100%;
      margin: 0 !important;
      padding: 0 !important;
    }

    .chart-card {
      background: var(--custom-card-bg, var(--card));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      min-height: min(var(--requested-card-height), calc(100vh - 32px));
      padding: clamp(14px, 2.5vw, 28px);
      backdrop-filter: blur(2px);
      box-sizing: border-box;
    }

    h1, h2, h3, .chart-title, canvas + div {
      font-family: "Merriweather", Georgia, serif !important;
      color: var(--custom-title, var(--ink)) !important;
    }

    #transport-summary {
      font-size: 13px !important;
      font-weight: 600;
      color: var(--custom-text, var(--ink-soft)) !important;
      background: rgba(255, 255, 255, 0.7) !important;
      border: 1px solid var(--line) !important;
      border-radius: 10px !important;
      padding: 8px 12px !important;
      margin-bottom: 12px !important;
    }

    #error {
      border-radius: 10px !important;
      border: 1px solid rgba(167, 48, 48, 0.28) !important;
      background: rgba(255, 236, 236, 0.88) !important;
      color: #7f1d1d !important;
    }

    .card {
      width: 100% !important;
      max-width: none !important;
      height: auto !important;
      margin: 0 !important;
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      padding: clamp(16px, 1.8vw, 24px) !important;
      backdrop-filter: none !important;
      box-sizing: border-box;
    }

    .canvas-wrap {
      width: 100% !important;
      height: auto !important;
      min-height: 0 !important;
    }

    #chart-wrap {
      width: 100% !important;
      min-height: min(72vh, 740px);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.34);
      border: 1px solid var(--custom-grid, var(--line));
      padding: clamp(8px, 1.4vw, 16px);
      box-sizing: border-box;
    }

    #chart-wrap canvas,
    canvas#chart-root,
    #chart-root {
      width: 100% !important;
      height: max(280px, min(var(--requested-plot-height), calc(100vh - 220px))) !important;
      display: block;
    }

    #chartCanvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    @media (max-width: 700px) {
      :root {
        --requested-card-width: calc(100vw - 24px);
      }

      #chart-wrap canvas,
      canvas#chart-root,
      #chart-root {
        height: max(240px, min(var(--requested-plot-height), calc(100vh - 180px))) !important;
      }
    }
  </style>
</head>
<body><div class="page-shell"><div class="chart-card">
  <div class="wrap">
    <div id="transportSummary" class="transport-summary"></div>
    <div class="card">
      <div id="error"></div>
      <div id="chart-root">
        <canvas id="chartCanvas"></canvas>
      </div>
    </div>
  </div>

  <script>
    (async function () {
      const cfg = {"request_version":"1.0","output":{"format":"html","container_id":"chart-root","width":1280,"height":720},"chart":{"type":"line","title":"Water Flow Comparison: {water_year} vs Average","show_legend":true,"show_grid":true,"x_axis_label":"Date","y_axis_label":"Flow (cfs)","stacked":false,"grid_style":{"color":"rgba(24,79,63,0.45)","width":1},"show_data_labels":false,"legend_position":"top","animation_duration":750,"y_axis_min":0},"data_source":{"proc_schema":"ri","proc_name":"RiverReleasesByYearWithAvg","endpoint":"http://localhost:3000/api/stored-proc","http_method":"GET","proc_params":{"water_year":2025},"result_set_index":0},"mapping":{"xField":"date","yField":"cfs","groupField":"series","labelTemplate":"{series} on {date}","x_axis_tick_format":"abbreviated_month"},"options":{"tension":0.8,"pointRadius":0,"pointHoverRadius":0,"borderWidth":2,"fill":false,"point_style":"circle"},"appearance":{"page_background":"linear-gradient(145deg, #d7e7df, #bfd6ce)","card_background":"#f3faf6","title_color":"#d7e7df","text_color":"#2f6f5d","grid_color":"rgba(24,79,63,0.2)","x_axis_label_color":"#FFFFFF","x_axis_value_color":"#2f6f5d","y_axis_label_color":"#FFFFFF","y_axis_value_color":"#2f6f5d","legend_text_color":"#FFFFFF","series_colors":["#2b8cbe","#f28e2b","#59a14f","#af7aa1"]},"notes":"Long/tidy format: each row has series_name, date, value. Multiple series grouped by series_name (e.g., '2025', 'Average'). This format is flexible for any number of series without contract changes."};

      const errorEl = document.getElementById('error');
      const transportEl = document.getElementById('transportSummary');

      function showError(msg) {
        errorEl.style.display = 'block';
        errorEl.textContent = msg;
      }

      if (cfg.appearance?.page_background) document.documentElement.style.setProperty('--page-bg', cfg.appearance.page_background);
      if (cfg.appearance?.card_background) document.documentElement.style.setProperty('--card-bg', cfg.appearance.card_background);
      if (cfg.appearance?.text_color) document.documentElement.style.setProperty('--text', cfg.appearance.text_color);

      const endpoint = cfg.data_source?.endpoint || '/api/stored-proc';
      const method = (cfg.data_source?.http_method || 'POST').toUpperCase();
      const procName = cfg.data_source?.proc_name || '';

      transportEl.textContent = `Endpoint: http://localhost:3000/api/stored-proc | Method: GET | Proc: RiverReleasesByYearWithAvg | Request URL: /api/stored-proc?proc_schema=ri&proc_name=RiverReleasesByYearWithAvg&result_set_index=0&proc_params.water_year=2025`;

      const payload = {
        proc_schema: cfg.data_source?.proc_schema,
        proc_name: cfg.data_source?.proc_name,
        proc_params: cfg.data_source?.proc_params || {},
        result_set_index: cfg.data_source?.result_set_index ?? 0
      };

      let response;
      try {
        if (method === 'GET') {
          const u = new URL(endpoint, window.location.origin);
          u.searchParams.set('proc_schema', payload.proc_schema ?? '');
          u.searchParams.set('proc_name', payload.proc_name ?? '');
          u.searchParams.set('proc_params', JSON.stringify(payload.proc_params ?? {}));
          u.searchParams.set('result_set_index', String(payload.result_set_index ?? 0));
          response = await fetch(u.toString(), { method: 'GET' });
        } else {
          response = await fetch(endpoint, {
            method: 'GET',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
        }
      } catch (e) {
        showError(`Fetch failed: ${method} ${endpoint} | ${e.message}`);
        return;
      }

      if (!response.ok) {
        showError(`Fetch failed with status ${response.status}: ${method} ${endpoint}`);
        return;
      }

      let raw;
      try {
        raw = await response.json();
      } catch (e) {
        showError(`Invalid JSON response: ${e.message}`);
        return;
      }

      const rows = Array.isArray(raw) ? raw : (Array.isArray(raw?.data) ? raw.data : (Array.isArray(raw?.rows) ? raw.rows : []));
      if (!Array.isArray(rows) || rows.length === 0) {
        showError('No data returned from stored procedure.');
        return;
      }

      const mapping = cfg.mapping || {};
      const requiredFields = [mapping.xField, mapping.yField, mapping.groupField].filter(Boolean);
      const hasValidRow = rows.some(r => requiredFields.every(f => Object.prototype.hasOwnProperty.call(r, f)));
      if (!hasValidRow) {
        showError(`Missing required mapped field(s): ${requiredFields.join(', ')}`);
        return;
      }

      const missingAny = requiredFields.filter(f => !rows.some(r => Object.prototype.hasOwnProperty.call(r, f)));
      if (missingAny.length) {
        showError(`Missing required mapped field(s): ${missingAny.join(', ')}`);
        return;
      }

      const xField = mapping.xField;
      const yField = mapping.yField;
      const groupField = mapping.groupField;

      const groups = new Map();
      rows.forEach(r => {
        if (!(xField in r) || !(yField in r) || !(groupField in r)) return;
        const g = String(r[groupField]);
        if (!groups.has(g)) groups.set(g, []);
        const xRaw = r[xField];
        const xVal = mapping.x_axis_tick_format ? new Date(xRaw).getTime() : xRaw;
        groups.get(g).push({
          x: xVal,
          y: Number(r[yField]),
          __row: r
        });
      });

      for (const [, arr] of groups) {
        arr.sort((a, b) => (a.x > b.x ? 1 : -1));
      }

      const seriesColors = cfg.appearance?.series_colors || [];
      const datasets = Array.from(groups.entries()).map(([name, points], i) => {
        const color = seriesColors.length ? seriesColors[i % seriesColors.length] : undefined;
        return {
          label: name,
          data: points,
          parsing: false,
          borderColor: color,
          backgroundColor: color,
          tension: cfg.options?.tension ?? 0,
          pointRadius: cfg.options?.pointRadius ?? 3,
          pointHoverRadius: cfg.options?.pointHoverRadius ?? 4,
          borderWidth: cfg.options?.borderWidth ?? 2,
          fill: cfg.options?.fill ?? false,
          pointStyle: cfg.options?.point_style || 'circle'
        };
      });

      const gridCfg = cfg.chart?.grid_style || cfg.appearance?.grid_style || {};
      const gridColor = gridCfg.color || cfg.appearance?.grid_color;
      const gridWidth = gridCfg.width;
      const gridDash = gridCfg.dash_pattern;

      const commonGrid = {
        display: cfg.chart?.show_grid === false ? false : true,
        color: gridColor,
        lineWidth: gridWidth,
        borderDash: Array.isArray(gridDash) ? gridDash : undefined
      };

      const xIsTime = !!mapping.x_axis_tick_format;

      const chartTitle = (cfg.chart?.title || '').replace(/\{(\w+)\}/g, (_, k) => {
        const v = cfg.data_source?.proc_params?.[k];
        return v == null ? `{${k}}` : String(v);
      });

      const chart = new Chart(document.getElementById('chartCanvas'), {
        type: 'line',
        data: { datasets },
        options: {
          maintainAspectRatio: false,
          animation: { duration: cfg.chart?.animation_duration ?? 1000 },
          plugins: {
            title: {
              display: !!chartTitle,
              text: chartTitle,
              color: cfg.appearance?.title_color
            },
            legend: {
              display: cfg.chart?.show_legend !== false,
              position: cfg.chart?.legend_position || 'top',
              labels: {
                color: cfg.appearance?.legend_text_color
              }
            },
            tooltip: {
              callbacks: {
                title: function(items) {
                  if (!items.length) return '';
                  const row = items[0].raw?.__row || {};
                  const tpl = mapping.labelTemplate;
                  if (!tpl) return items[0].dataset.label || '';
                  return tpl.replace(/\{(\w+)\}/g, (_, k) => {
                    if (row[k] != null) return String(row[k]);
                    const p = cfg.data_source?.proc_params?.[k];
                    return p != null ? String(p) : '';
                  });
                }
              }
            }
          },
          scales: {
            x: {
              type: xIsTime ? 'time' : 'category',
              time: xIsTime ? {
                unit: 'month',
                round: 'month',
                displayFormats: { month: 'MMM' }
              } : undefined,
              ticks: {
                color: cfg.appearance?.x_axis_value_color,
                callback: xIsTime ? function(value) {
                  const d = new Date(value);
                  return d.toLocaleString('en-US', { month: 'short' });
                } : undefined
              },
              title: {
                display: !!cfg.chart?.x_axis_label,
                text: cfg.chart?.x_axis_label || '',
                color: cfg.appearance?.x_axis_label_color
              },
              grid: commonGrid,
              stacked: !!cfg.chart?.stacked
            },
            y: {
              beginAtZero: cfg.chart?.y_axis_min == null,
              min: cfg.chart?.y_axis_min,
              max: cfg.chart?.y_axis_max,
              ticks: {
                color: cfg.appearance?.y_axis_value_color
              },
              title: {
                display: !!cfg.chart?.y_axis_label,
                text: cfg.chart?.y_axis_label || '',
                color: cfg.appearance?.y_axis_label_color
              },
              grid: commonGrid,
              stacked: !!cfg.chart?.stacked
            }
          }
        }
      });
    })();
  </script>
</div></div></body>
</html>
