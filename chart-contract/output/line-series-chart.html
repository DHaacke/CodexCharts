<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chart Renderer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <style>
    :root {
      --page-bg: linear-gradient(145deg, #d7e7df, #bfd6ce);
      --card-bg: #f3faf6;
      --text-color: #2f6f5d;
      --title-color: #d7e7df;
    }
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--page-bg);
      color: var(--text-color);
    }
    .wrap {
      width: 1280px;
      height: 720px;
      margin: 0 auto;
      box-sizing: border-box;
      padding: 12px;
    }
    .transport {
      font-size: 12px;
      line-height: 1.2;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 6px;
      padding: 6px 8px;
      margin-bottom: 8px;
      color: #1f3d35;
      word-break: break-all;
    }
    .card {
      width: 100%;
      height: calc(100% - 44px);
      background: var(--card-bg);
      border-radius: 10px;
      box-sizing: border-box;
      padding: 10px 14px 14px 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      position: relative;
    }
    .title {
      margin: 0 0 8px 0;
      font-size: 20px;
      color: var(--title-color);
      font-weight: 700;
    }
    #chart-root {
      position: relative;
      width: 100%;
      height: calc(100% - 36px);
    }
    #error {
      display: none;
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      background: #ffe6e6;
      color: #8a1f1f;
      border: 1px solid #f1b5b5;
      font-size: 13px;
      white-space: pre-wrap;
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet" />
  <style id="chart-theme-injected">
    :root {
      --custom-page-bg: linear-gradient(145deg, #d7e7df, #bfd6ce); --custom-card-bg: #f3faf6; --custom-title: #d7e7df; --custom-text: #2f6f5d; --custom-grid: rgba(24,79,63,0.2); --custom-x-axis-label: #FFFFFF; --custom-x-axis-value: #2f6f5d; --custom-y-axis-label: #FFFFFF; --custom-y-axis-value: #2f6f5d; --custom-legend-text: #FFFFFF;
      --requested-card-width: 1280px; --requested-card-height: 720px; --requested-plot-height: calc(720px - 156px);
      --bg-a: #d7e7df;
      --bg-b: #bfd6ce;
      --card: rgba(243, 250, 246, 0.82);
      --ink: #184f3f;
      --ink-soft: #2f6f5d;
      --line: rgba(24, 79, 63, 0.2);
      --shadow: 0 28px 60px rgba(23, 58, 52, 0.22);
      --glow-a: rgba(255, 255, 255, 0.52);
      --glow-b: rgba(255, 255, 255, 0.4);
      --panel-bg: rgba(255, 255, 255, 0.7);
      --error-bg: rgba(255, 236, 236, 0.88);
      --error-border: rgba(167, 48, 48, 0.28);
      --error-text: #7f1d1d;
      --custom-x-axis-label: #184f3f;
      --custom-x-axis-value: #2f6f5d;
      --custom-y-axis-label: #184f3f;
      --custom-y-axis-value: #2f6f5d;
      --custom-legend-text: #184f3f;
    }

    body[data-theme='dark'] {
      --bg-a: #10221d;
      --bg-b: #0b1815;
      --card: rgba(19, 39, 34, 0.9);
      --ink: #d7ece5;
      --ink-soft: #b7d8ce;
      --line: rgba(143, 191, 174, 0.28);
      --shadow: 0 28px 60px rgba(2, 10, 8, 0.5);
      --glow-a: rgba(0, 0, 0, 0.22);
      --glow-b: rgba(0, 0, 0, 0.35);
      --panel-bg: rgba(12, 30, 25, 0.72);
      --error-bg: rgba(84, 28, 28, 0.55);
      --error-border: rgba(228, 119, 119, 0.4);
      --error-text: #ffd1d1;
      color-scheme: dark;
    }

    @media (prefers-color-scheme: dark) {
      body[data-theme='auto'] {
        --bg-a: #10221d;
        --bg-b: #0b1815;
        --card: rgba(19, 39, 34, 0.9);
        --ink: #d7ece5;
        --ink-soft: #b7d8ce;
        --line: rgba(143, 191, 174, 0.28);
        --shadow: 0 28px 60px rgba(2, 10, 8, 0.5);
        --glow-a: rgba(0, 0, 0, 0.22);
        --glow-b: rgba(0, 0, 0, 0.35);
        --panel-bg: rgba(12, 30, 25, 0.72);
        --error-bg: rgba(84, 28, 28, 0.55);
        --error-border: rgba(228, 119, 119, 0.4);
        --error-text: #ffd1d1;
        color-scheme: dark;
      }
    }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Source Sans 3", "Segoe UI", sans-serif !important;
      color: var(--ink);
      display: block !important;
      align-items: initial !important;
      justify-content: initial !important;
      background:
        radial-gradient(circle at 8% 0%, var(--glow-a), transparent 38%),
        radial-gradient(circle at 90% 100%, var(--glow-b), transparent 35%),
        var(--custom-page-bg, linear-gradient(145deg, var(--bg-a), var(--bg-b))) !important;
      padding: clamp(16px, 2.5vw, 34px);
      box-sizing: border-box;
    }

    .page-shell {
      width: min(var(--requested-card-width), calc(100vw - 32px));
      max-width: none;
      margin: 0 auto;
    }

    .wrap {
      max-width: none !important;
      width: 100%;
      margin: 0 !important;
      padding: 0 !important;
    }

    .chart-card {
      background: var(--custom-card-bg, var(--card));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      min-height: min(var(--requested-card-height), calc(100vh - 32px));
      padding: clamp(14px, 2.5vw, 28px);
      backdrop-filter: blur(2px);
      box-sizing: border-box;
    }

    h1, h2, h3, .chart-title, canvas + div {
      font-family: "Merriweather", Georgia, serif !important;
      color: var(--custom-title, var(--ink)) !important;
    }

    #transport-summary {
      font-size: 13px !important;
      font-weight: 600;
      color: var(--custom-text, var(--ink-soft)) !important;
      background: var(--panel-bg) !important;
      border: 1px solid var(--line) !important;
      border-radius: 10px !important;
      padding: 8px 12px !important;
      margin-bottom: 12px !important;
    }

    #error {
      border-radius: 10px !important;
      border: 1px solid var(--error-border) !important;
      background: var(--error-bg) !important;
      color: var(--error-text) !important;
    }

    .card {
      width: 100% !important;
      max-width: none !important;
      height: auto !important;
      margin: 0 !important;
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      padding: clamp(16px, 1.8vw, 24px) !important;
      backdrop-filter: none !important;
      box-sizing: border-box;
    }

    .canvas-wrap {
      width: 100% !important;
      height: auto !important;
      min-height: 0 !important;
    }

    #chart-wrap {
      width: 100% !important;
      min-height: min(72vh, 740px);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.34);
      border: 1px solid var(--custom-grid, var(--line));
      padding: clamp(8px, 1.4vw, 16px);
      box-sizing: border-box;
    }

    #chart-wrap canvas,
    canvas#chart-root,
    #chart-root {
      width: 100% !important;
      height: max(280px, min(var(--requested-plot-height), calc(100vh - 220px))) !important;
      display: block;
    }

    #chartCanvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    @media (max-width: 700px) {
      :root {
        --requested-card-width: calc(100vw - 24px);
      }

      #chart-wrap canvas,
      canvas#chart-root,
      #chart-root {
        height: max(240px, min(var(--requested-plot-height), calc(100vh - 180px))) !important;
      }
    }
  </style>
</head>
<body data-theme="light"><div class="page-shell"><div class="chart-card">
  <div class="wrap">
    <div id="transport" class="transport"></div>
    <div class="card">
      <h2 id="chart-title" class="title"></h2>
      <div id="chart-root">
        <canvas id="chartCanvas"></canvas>
      </div>
      <div id="error"></div>
    </div>
  </div>

  <script>
    (async function () {
      const request = {"request_version":"1.0","output":{"format":"html","theme":"light","container_id":"chart-root","width":1280,"height":720},"chart":{"type":"line","title":"Water Flow Comparison: {water_year} vs Average","show_legend":true,"show_grid":true,"x_axis_label":"Date","y_axis_label":"Flow (cfs)","stacked":false,"grid_style":{"color":"rgba(24,79,63,0.45)","width":1},"show_data_labels":false,"legend_position":"top","animation_duration":750,"y_axis_min":1000},"data_source":{"proc_schema":"ri","proc_name":"RiverReleasesByYearWithAvg","endpoint":"http://localhost:3000/api/stored-proc","http_method":"GET","proc_params":{"water_year":2025},"result_set_index":0},"mapping":{"xField":"date","yField":"cfs","groupField":"series","labelTemplate":"{series} on {date}","x_axis_tick_format":"abbreviated_month"},"options":{"tension":0.8,"pointRadius":0,"pointHoverRadius":0,"borderWidth":2,"fill":false,"point_style":"circle"},"appearance":{"page_background":"linear-gradient(145deg, #d7e7df, #bfd6ce)","card_background":"#f3faf6","title_color":"#d7e7df","text_color":"#2f6f5d","grid_color":"rgba(24,79,63,0.2)","x_axis_label_color":"#FFFFFF","x_axis_value_color":"#2f6f5d","y_axis_label_color":"#FFFFFF","y_axis_value_color":"#2f6f5d","legend_text_color":"#FFFFFF","series_colors":["#2b8cbe","#f28e2b","#59a14f","#af7aa1"]},"notes":"Long/tidy format: each row has series_name, date, value. Multiple series grouped by series_name (e.g., '2025', 'Average'). This format is flexible for any number of series without contract changes."};

      const appearance = request.appearance || {};
      if (appearance.page_background) document.documentElement.style.setProperty('--page-bg', appearance.page_background);
      if (appearance.card_background) document.documentElement.style.setProperty('--card-bg', appearance.card_background);
      if (appearance.text_color) document.documentElement.style.setProperty('--text-color', appearance.text_color);
      if (appearance.title_color) document.documentElement.style.setProperty('--title-color', appearance.title_color);

      const ds = request.data_source || {};
      const endpoint = ds.endpoint || '/api/stored-proc';
      const method = (ds.http_method || 'POST').toUpperCase();
      const proc_schema = ds.proc_schema;
      const proc_name = ds.proc_name;
      const proc_params = ds.proc_params || {};
      const result_set_index = ds.result_set_index ?? 0;

      document.getElementById('transport').textContent = `Endpoint: ${endpoint} | Method: ${method} | proc_name: ${proc_name}`;

      const titleTemplate = (request.chart && request.chart.title) ? request.chart.title : '';
      const titleResolved = titleTemplate.replace(/\{([^}]+)\}/g, (_, key) => {
        const v = proc_params[key];
        return v === undefined || v === null ? `{${key}}` : String(v);
      });
      document.getElementById('chart-title').textContent = titleResolved;

      const errorEl = document.getElementById('error');
      const showError = (msg) => {
        errorEl.style.display = 'block';
        errorEl.textContent = msg;
      };

      function buildLabelTemplate(row, template, fallback) {
        if (!template) return '';
        return template.replace(/\{([^}]+)\}/g, (_, key) => {
          if (row && row[key] !== undefined && row[key] !== null) return String(row[key]);
          if (fallback && fallback[key] !== undefined && fallback[key] !== null) return String(fallback[key]);
          return '';
        });
      }

      let response;
      try {
        if (method === 'GET') {
          const url = new URL(endpoint, window.location.origin);
          url.searchParams.set('proc_schema', proc_schema);
          url.searchParams.set('proc_name', proc_name);
          url.searchParams.set('proc_params', JSON.stringify(proc_params));
          url.searchParams.set('result_set_index', String(result_set_index));
          response = await fetch(url.toString(), { method: 'GET' });
        } else {
          response = await fetch(endpoint, {
            method: 'GET',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ proc_schema, proc_name, proc_params, result_set_index })
          });
        }
      } catch (e) {
        showError(`Fetch failed: ${method} ${endpoint}\n${e.message}`);
        return;
      }

      if (!response.ok) {
        showError(`Fetch failed with status ${response.status}: ${method} ${endpoint}`);
        return;
      }

      let payload;
      try {
        payload = await response.json();
      } catch (e) {
        showError(`Invalid JSON response: ${e.message}`);
        return;
      }

      let rows = [];
      if (Array.isArray(payload)) rows = payload;
      else if (payload && Array.isArray(payload.data)) rows = payload.data;
      else if (payload && Array.isArray(payload.rows)) rows = payload.rows;
      else if (payload && Array.isArray(payload.result)) rows = payload.result;

      if (!rows.length) {
        showError('No data rows returned from endpoint.');
        return;
      }

      const mapping = request.mapping || {};
      const required = [];
      if (mapping.xField) required.push(mapping.xField);
      if (mapping.yField) required.push(mapping.yField);
      if (mapping.groupField) required.push(mapping.groupField);

      const hasCompleteRow = rows.some(r => required.every(f => r && r[f] !== undefined && r[f] !== null));
      if (!hasCompleteRow) {
        const missing = required.filter(f => !rows.some(r => r && r[f] !== undefined && r[f] !== null));
        showError(`Missing required mapped field(s): ${missing.join(', ')}`);
        return;
      }

      const xField = mapping.xField;
      const yField = mapping.yField;
      const groupField = mapping.groupField;
      const labelTemplate = mapping.labelTemplate;

      const groups = new Map();
      rows.forEach((r) => {
        if (r[xField] === undefined || r[yField] === undefined || r[xField] === null || r[yField] === null) return;
        const g = groupField ? String(r[groupField]) : 'Series';
        if (!groups.has(g)) groups.set(g, []);
        const xRaw = r[xField];
        const xVal = new Date(xRaw).getTime();
        groups.get(g).push({
          x: xVal,
          y: Number(r[yField]),
          __row: r,
          __label: buildLabelTemplate(r, labelTemplate, proc_params)
        });
      });

      for (const arr of groups.values()) {
        arr.sort((a, b) => a.x - b.x);
      }

      const seriesColors = (appearance.series_colors && appearance.series_colors.length) ? appearance.series_colors : ['#3366cc', '#dc3912', '#ff9900', '#109618'];
      let colorIdx = 0;
      const datasets = Array.from(groups.entries()).map(([name, data]) => {
        const c = seriesColors[colorIdx++ % seriesColors.length];
        return {
          label: name,
          data,
          parsing: false,
          borderColor: c,
          backgroundColor: c,
          tension: request.options?.tension ?? 0,
          pointRadius: request.options?.pointRadius ?? 3,
          pointHoverRadius: request.options?.pointHoverRadius ?? 4,
          fill: request.options?.fill ?? false,
          borderWidth: request.options?.borderWidth ?? 2,
          pointStyle: request.options?.point_style || 'circle'
        };
      });

      const gridStyle = request.chart?.grid_style || appearance.grid_style || {};
      const gridDisplay = request.chart?.show_grid === false ? false : true;
      const gridColor = gridStyle.color || appearance.grid_color || 'rgba(0,0,0,0.1)';
      const gridWidth = gridStyle.width ?? 1;
      const gridDash = Array.isArray(gridStyle.dash_pattern) ? gridStyle.dash_pattern : [];

      const ctx = document.getElementById('chartCanvas').getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: { datasets },
        options: {
          maintainAspectRatio: false,
          animation: { duration: request.chart?.animation_duration ?? 1000 },
          plugins: {
            legend: {
              display: request.chart?.show_legend !== false,
              position: request.chart?.legend_position || 'top',
              labels: { color: appearance.legend_text_color || appearance.text_color || '#333' }
            },
            tooltip: {
              callbacks: {
                title: (items) => {
                  const x = items?.[0]?.parsed?.x;
                  return x != null ? new Date(x).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }) : '';
                },
                label: (item) => {
                  const raw = item.raw || {};
                  const templ = raw.__label;
                  if (templ) return `${item.dataset.label}: ${templ} (${item.parsed.y})`;
                  return `${item.dataset.label}: ${item.parsed.y}`;
                }
              }
            }
          },
          scales: {
            x: {
              type: 'time',
              time: {
                unit: 'month',
                round: 'month',
                displayFormats: { month: 'MMM' }
              },
              ticks: {
                color: appearance.x_axis_value_color || appearance.text_color || '#333'
              },
              title: {
                display: !!request.chart?.x_axis_label,
                text: request.chart?.x_axis_label || '',
                color: appearance.x_axis_label_color || appearance.text_color || '#333'
              },
              grid: {
                display: gridDisplay,
                color: gridColor,
                lineWidth: gridWidth,
                borderDash: gridDash
              }
            },
            y: {
              stacked: !!request.chart?.stacked,
              min: request.chart?.y_axis_min,
              max: request.chart?.y_axis_max,
              ticks: {
                color: appearance.y_axis_value_color || appearance.text_color || '#333'
              },
              title: {
                display: !!request.chart?.y_axis_label,
                text: request.chart?.y_axis_label || '',
                color: appearance.y_axis_label_color || appearance.text_color || '#333'
              },
              grid: {
                display: gridDisplay,
                color: gridColor,
                lineWidth: gridWidth,
                borderDash: gridDash
              }
            }
          }
        }
      });
    })();
  </script>
</div></div></body>
</html>
