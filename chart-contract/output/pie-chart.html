<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chart Renderer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --page-bg: linear-gradient(145deg, #d7e7df, #bfd6ce);
      --card-bg: rgba(243,250,246,0.82);
      --title-color: #184f3f;
      --text-color: #2f6f5d;
      --grid-color: rgba(24,79,63,0.2);
      --x-axis-label-color: #184f3f;
      --x-axis-value-color: #2f6f5d;
      --y-axis-label-color: #184f3f;
      --y-axis-value-color: #2f6f5d;
      --legend-text-color: #184f3f;
    }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--page-bg);
      color: var(--text-color);
    }
    .wrap {
      width: 1100px;
      margin: 18px auto;
    }
    .transport {
      font-size: 12px;
      background: var(--card-bg);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 10px;
      color: var(--text-color);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      word-break: break-all;
    }
    .card {
      width: 1100px;
      height: 680px;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      padding: 14px 16px 10px 16px;
      box-sizing: border-box;
    }
    .title {
      margin: 0 0 8px 0;
      color: var(--title-color);
      font-size: 22px;
      font-weight: 700;
      text-align: center;
    }
    .error {
      color: #8b0000;
      background: #ffe9e9;
      border: 1px solid #ffbdbd;
      padding: 10px;
      border-radius: 8px;
      margin-top: 8px;
      white-space: pre-wrap;
    }
    .canvas-wrap {
      position: relative;
      width: 100%;
      height: calc(100% - 44px);
    }
    canvas {
      width: 100% !important;
      height: 100% !important;
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet" />
  <style id="chart-theme-injected">
    :root {
      --custom-page-bg: linear-gradient(145deg, #d7e7df, #bfd6ce); --custom-card-bg: rgba(243,250,246,0.82); --custom-title: #184f3f; --custom-text: #2f6f5d; --custom-grid: rgba(24,79,63,0.2); --custom-x-axis-label: #184f3f; --custom-x-axis-value: #2f6f5d; --custom-y-axis-label: #184f3f; --custom-y-axis-value: #2f6f5d; --custom-legend-text: #184f3f;
      --requested-card-width: 1100px; --requested-card-height: 680px; --requested-plot-height: calc(680px - 156px);
      --bg-a: #d7e7df;
      --bg-b: #bfd6ce;
      --card: rgba(243, 250, 246, 0.82);
      --ink: #184f3f;
      --ink-soft: #2f6f5d;
      --line: rgba(24, 79, 63, 0.2);
      --shadow: 0 28px 60px rgba(23, 58, 52, 0.22);      --custom-x-axis-label: #184f3f;
      --custom-x-axis-value: #2f6f5d;
      --custom-y-axis-label: #184f3f;
      --custom-y-axis-value: #2f6f5d;
      --custom-legend-text: #184f3f;    }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Source Sans 3", "Segoe UI", sans-serif !important;
      color: var(--ink);
      display: block !important;
      align-items: initial !important;
      justify-content: initial !important;
      background:
        radial-gradient(circle at 8% 0%, rgba(255, 255, 255, 0.52), transparent 38%),
        radial-gradient(circle at 90% 100%, rgba(255, 255, 255, 0.4), transparent 35%),
        var(--custom-page-bg, linear-gradient(145deg, var(--bg-a), var(--bg-b))) !important;
      padding: clamp(16px, 2.5vw, 34px);
      box-sizing: border-box;
    }

    .page-shell {
      width: min(var(--requested-card-width), calc(100vw - 32px));
      max-width: none;
      margin: 0 auto;
    }

    .wrap {
      max-width: none !important;
      width: 100%;
      margin: 0 !important;
      padding: 0 !important;
    }

    .chart-card {
      background: var(--custom-card-bg, var(--card));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      min-height: min(var(--requested-card-height), calc(100vh - 32px));
      padding: clamp(14px, 2.5vw, 28px);
      backdrop-filter: blur(2px);
      box-sizing: border-box;
    }

    h1, h2, h3, .chart-title, canvas + div {
      font-family: "Merriweather", Georgia, serif !important;
      color: var(--custom-title, var(--ink)) !important;
    }

    #transport-summary {
      font-size: 13px !important;
      font-weight: 600;
      color: var(--custom-text, var(--ink-soft)) !important;
      background: rgba(255, 255, 255, 0.7) !important;
      border: 1px solid var(--line) !important;
      border-radius: 10px !important;
      padding: 8px 12px !important;
      margin-bottom: 12px !important;
    }

    #error {
      border-radius: 10px !important;
      border: 1px solid rgba(167, 48, 48, 0.28) !important;
      background: rgba(255, 236, 236, 0.88) !important;
      color: #7f1d1d !important;
    }

    .card {
      width: 100% !important;
      max-width: none !important;
      height: auto !important;
      margin: 0 !important;
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      padding: clamp(16px, 1.8vw, 24px) !important;
      backdrop-filter: none !important;
      box-sizing: border-box;
    }

    .canvas-wrap {
      width: 100% !important;
      height: auto !important;
      min-height: 0 !important;
    }

    #chart-wrap {
      width: 100% !important;
      min-height: min(72vh, 740px);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.34);
      border: 1px solid var(--custom-grid, var(--line));
      padding: clamp(8px, 1.4vw, 16px);
      box-sizing: border-box;
    }

    #chart-wrap canvas,
    canvas#chart-root,
    #chart-root {
      width: 100% !important;
      height: max(280px, min(var(--requested-plot-height), calc(100vh - 220px))) !important;
      display: block;
    }

    #chartCanvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    @media (max-width: 700px) {
      :root {
        --requested-card-width: calc(100vw - 24px);
      }

      #chart-wrap canvas,
      canvas#chart-root,
      #chart-root {
        height: max(240px, min(var(--requested-plot-height), calc(100vh - 180px))) !important;
      }
    }
  </style>
</head>
<body><div class="page-shell"><div class="chart-card">
  <div class="wrap">
    <div id="transport" class="transport"></div>
    <div class="card">
      <h2 id="chartTitle" class="title"></h2>
      <div class="canvas-wrap">
        <canvas id="chart-root"></canvas>
      </div>
      <div id="errorBox" class="error" style="display:none;"></div>
    </div>
  </div>

  <script>
    (async function () {
      const request = {"request_version":"1.0","output":{"format":"html","container_id":"chart-root","width":1100,"height":680},"chart":{"type":"pie","title":"{species} {from_year}-{to_year} Abundance Share","show_legend":true,"x_axis_label":"","y_axis_label":""},"data_source":{"proc_schema":"ri","proc_name":"FWPSpeciesCountByYear","endpoint":"http://localhost:3000/api/stored-proc","http_method":"GET","proc_params":{"from_year":"2024","to_year":"2026"},"result_set_index":0},"mapping":{"categoryField":"species","valueField":"abundance","labelTemplate":"{species} {year}"},"options":{"plugins":{"legend":{"position":"right"}}},"appearance":{"page_background":"linear-gradient(145deg, #d7e7df, #bfd6ce)","card_background":"rgba(243,250,246,0.82)","title_color":"#184f3f","text_color":"#2f6f5d","grid_color":"rgba(24,79,63,0.2)","x_axis_label_color":"#184f3f","x_axis_value_color":"#2f6f5d","y_axis_label_color":"#184f3f","y_axis_value_color":"#2f6f5d","legend_text_color":"#184f3f","series_colors":["#4e79a7","#f28e2b","#59a14f","#e15759","#af7aa1"]}};

      const appearance = request.appearance || {};
      const dataSource = request.data_source || {};
      const mapping = request.mapping || {};
      const chartCfg = request.chart || {};
      const options = request.options || {};
      const endpoint = dataSource.endpoint || '/api/stored-proc';
      const method = (dataSource.http_method || 'POST').toUpperCase();
      const procSchema = dataSource.proc_schema;
      const procName = dataSource.proc_name;
      const procParams = dataSource.proc_params || {};
      const resultSetIndex = dataSource.result_set_index ?? 0;

      const transportEl = document.getElementById('transport');
      const errorEl = document.getElementById('errorBox');
      const titleEl = document.getElementById('chartTitle');

      if (appearance.page_background) document.documentElement.style.setProperty('--page-bg', appearance.page_background);
      if (appearance.card_background) document.documentElement.style.setProperty('--card-bg', appearance.card_background);
      if (appearance.title_color) document.documentElement.style.setProperty('--title-color', appearance.title_color);
      if (appearance.text_color) document.documentElement.style.setProperty('--text-color', appearance.text_color);
      if (appearance.grid_color) document.documentElement.style.setProperty('--grid-color', appearance.grid_color);
      if (appearance.x_axis_label_color) document.documentElement.style.setProperty('--x-axis-label-color', appearance.x_axis_label_color);
      if (appearance.x_axis_value_color) document.documentElement.style.setProperty('--x-axis-value-color', appearance.x_axis_value_color);
      if (appearance.y_axis_label_color) document.documentElement.style.setProperty('--y-axis-label-color', appearance.y_axis_label_color);
      if (appearance.y_axis_value_color) document.documentElement.style.setProperty('--y-axis-value-color', appearance.y_axis_value_color);
      if (appearance.legend_text_color) document.documentElement.style.setProperty('--legend-text-color', appearance.legend_text_color);

      function showError(msg) {
        errorEl.style.display = 'block';
        errorEl.textContent = msg;
      }

      const transportSummary = `Endpoint: ${endpoint} | Method: ${method} | Proc: ${procName}`;
      transportEl.textContent = transportSummary;

      function applyTemplate(template, row, fallbackParams) {
        if (!template || typeof template !== 'string') return '';
        return template.replace(/\{([^}]+)\}/g, (_, key) => {
          if (row && row[key] !== undefined && row[key] !== null) return String(row[key]);
          if (fallbackParams && fallbackParams[key] !== undefined && fallbackParams[key] !== null) return String(fallbackParams[key]);
          return '';
        }).trim();
      }

      const dynamicTitle = applyTemplate(chartCfg.title || '', {}, procParams);
      titleEl.textContent = dynamicTitle || '';

      let url = endpoint;
      const payload = {
        proc_schema: procSchema,
        proc_name: procName,
        proc_params: procParams,
        result_set_index: resultSetIndex
      };

      const fetchOptions = { method, headers: {} };
      if (method === 'GET') {
        const qs = new URLSearchParams();
        qs.set('proc_schema', procSchema);
        qs.set('proc_name', procName);
        qs.set('proc_params', JSON.stringify(procParams));
        qs.set('result_set_index', String(resultSetIndex));
        url += (url.includes('?') ? '&' : '?') + qs.toString();
      } else {
        fetchOptions.headers['Content-Type'] = 'application/json';
        fetchOptions.body = JSON.stringify(payload);
      }

      let raw;
      try {
        const resp = await fetch(url, fetchOptions);
        if (!resp.ok) {
          showError(`Fetch failed with status ${resp.status} (${method} ${endpoint})`);
          return;
        }
        raw = await resp.json();
      } catch (e) {
        showError(`Fetch failed (${method} ${endpoint}): ${e.message}`);
        return;
      }

      let rows = [];
      if (Array.isArray(raw)) rows = raw;
      else if (raw && Array.isArray(raw.data)) rows = raw.data;
      else if (raw && Array.isArray(raw.rows)) rows = raw.rows;
      else if (raw && Array.isArray(raw.result)) rows = raw.result;
      else if (raw && Array.isArray(raw[String(resultSetIndex)])) rows = raw[String(resultSetIndex)];

      const requiredFields = [mapping.categoryField, mapping.valueField].filter(Boolean);
      if (mapping.labelTemplate) {
        const tmplFields = [...mapping.labelTemplate.matchAll(/\{([^}]+)\}/g)].map(m => m[1]);
        for (const f of tmplFields) {
          if (!(f in procParams) && !requiredFields.includes(f)) requiredFields.push(f);
        }
      }

      const validRow = rows.find(r => requiredFields.every(f => Object.prototype.hasOwnProperty.call(r, f)));
      if (!validRow) {
        const missing = requiredFields.filter(f => !rows.some(r => Object.prototype.hasOwnProperty.call(r, f)));
        showError(`Missing required mapped field(s): ${missing.join(', ')}`);
        return;
      }

      const labels = rows.map(r => mapping.labelTemplate ? applyTemplate(mapping.labelTemplate, r, procParams) : String(r[mapping.categoryField]));
      const values = rows.map(r => Number(r[mapping.valueField]));

      const seriesColors = Array.isArray(appearance.series_colors) && appearance.series_colors.length
        ? appearance.series_colors
        : ['#4e79a7', '#f28e2b', '#59a14f', '#e15759', '#af7aa1'];

      const bgColors = values.map((_, i) => seriesColors[i % seriesColors.length]);
      const borderColors = values.map((_, i) => seriesColors[i % seriesColors.length]);

      const ctx = document.getElementById(request.output.container_id).getContext('2d');

      new Chart(ctx, {
        type: chartCfg.type,
        data: {
          labels,
          datasets: [{
            label: chartCfg.title || '',
            data: values,
            backgroundColor: bgColors,
            borderColor: borderColors,
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: chartCfg.show_legend !== false,
              position: options?.plugins?.legend?.position || 'top',
              labels: {
                color: appearance.legend_text_color || undefined
              }
            },
            tooltip: {
              callbacks: {
                title: (items) => {
                  const i = items[0].dataIndex;
                  return labels[i];
                },
                label: (item) => `${labels[item.dataIndex]}: ${item.formattedValue}`
              }
            }
          },
          scales: chartCfg.type === 'pie' ? {} : {
            x: {
              title: {
                display: !!chartCfg.x_axis_label,
                text: chartCfg.x_axis_label || '',
                color: appearance.x_axis_label_color || undefined
              },
              ticks: {
                color: appearance.x_axis_value_color || undefined
              },
              grid: {
                color: appearance.grid_color || undefined
              }
            },
            y: {
              title: {
                display: !!chartCfg.y_axis_label,
                text: chartCfg.y_axis_label || '',
                color: appearance.y_axis_label_color || undefined
              },
              ticks: {
                color: appearance.y_axis_value_color || undefined
              },
              grid: {
                color: appearance.grid_color || undefined
              }
            }
          }
        }
      });
    })();
  </script>
</div></div></body>
</html>
