<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FWP Species Abundance Share</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 12px; color: #222; }
    #transport-summary {
      font-size: 12px;
      background: #f5f7fb;
      border: 1px solid #d9e1ef;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 10px;
      line-height: 1.4;
      word-break: break-all;
    }
    #error {
      display: none;
      color: #b00020;
      background: #fdecef;
      border: 1px solid #f5c2c7;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 10px;
      white-space: pre-wrap;
    }
    #chart-wrap {
      width: 100%;
      max-width: 900px;
      height: 520px;
    }
    #chart-root {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="transport-summary"></div>
  <div id="error"></div>
  <div id="chart-wrap">
    <canvas id="chart-root"></canvas>
  </div>

  <script>
    (async function () {
      const cfg = {
        chart: {
          type: "pie",
          title: "FWP Species Abundance Share",
          show_legend: true
        },
        data_source: {
          proc_schema: "ri",
          proc_name: "FWPSpeciesCountByYear",
          endpoint: "http://localhost:3000/api/stored-proc",
          http_method: 'GET',
          proc_params: { from_year: "2024", to_year: "2026" },
          result_set_index: 0
        },
        mapping: {
          categoryField: "species",
          valueField: "abundance"
        },
        options: {
          plugins: {
            legend: { position: "right" }
          }
        }
      };

      const endpoint = cfg.data_source.endpoint || "/api/stored-proc";
      const method = (cfg.data_source.http_method || "POST").toUpperCase();
      const transportEl = document.getElementById('transport-summary');
      const errorEl = document.getElementById("error");

      function showError(msg) {
        errorEl.style.display = "block";
        errorEl.textContent = msg;
      }

      transportEl.textContent = `Endpoint: http://localhost:3000/api/stored-proc | Method: GET | Proc: FWPSpeciesCountByYear | Request URL: /api/stored-proc?proc_schema=ri&proc_name=FWPSpeciesCountByYear&result_set_index=0&proc_params.from_year=2024&proc_params.to_year=2026`;

      const payload = {
        proc_schema: cfg.data_source.proc_schema,
        proc_name: cfg.data_source.proc_name,
        proc_params: cfg.data_source.proc_params || {},
        result_set_index: cfg.data_source.result_set_index ?? 0
      };

      let url = endpoint;
      const fetchOptions = { method, headers: {} };

      if (method === "GET") {
        const params = new URLSearchParams();
        params.set("proc_schema", payload.proc_schema ?? "");
        params.set("proc_name", payload.proc_name ?? "");
        params.set("result_set_index", String(payload.result_set_index));
        if (payload.proc_params && typeof payload.proc_params === "object") {
          for (const [k, v] of Object.entries(payload.proc_params)) {
            params.set(`proc_params.${k}`, v == null ? "" : String(v));
          }
        }
        url += (url.includes("?") ? "&" : "?") + params.toString();
      } else {
        fetchOptions.headers["Content-Type"] = "application/json";
        fetchOptions.body = JSON.stringify(payload);
      }

      let response;
      try {
        response = await fetch(url, fetchOptions);
      } catch (e) {
        showError(`Request failed: ${method} ${endpoint}\n${e.message}`);
        return;
      }

      if (!response.ok) {
        showError(`Fetch error: HTTP ${response.status} for ${method} ${endpoint}`);
        return;
      }

      let data;
      try {
        data = await response.json();
      } catch (e) {
        showError(`Invalid JSON response from ${method} ${endpoint}: ${e.message}`);
        return;
      }

      let rows = Array.isArray(data) ? data : (Array.isArray(data?.rows) ? data.rows : []);
      if (!Array.isArray(rows)) rows = [];

      const requiredFields = [cfg.mapping.categoryField, cfg.mapping.valueField];
      const hasValidRow = rows.some(r => r && requiredFields.every(f => Object.prototype.hasOwnProperty.call(r, f)));

      if (!hasValidRow) {
        const missing = requiredFields.filter(f => !rows.some(r => r && Object.prototype.hasOwnProperty.call(r, f)));
        showError(`Missing required mapped field(s): ${missing.join(", ")}`);
        return;
      }

      const validRows = rows.filter(r => r && requiredFields.every(f => Object.prototype.hasOwnProperty.call(r, f)));
      const labels = validRows.map(r => r[cfg.mapping.categoryField]);
      const values = validRows.map(r => {
        const n = Number(r[cfg.mapping.valueField]);
        return Number.isFinite(n) ? n : 0;
      });

      const ctx = document.getElementById("chart-root").getContext("2d");
      new Chart(ctx, {
        type: cfg.chart.type,
        data: {
          labels,
          datasets: [{
            label: cfg.chart.title,
            data: values
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            title: {
              display: !!cfg.chart.title,
              text: cfg.chart.title
            },
            legend: {
              display: !!cfg.chart.show_legend,
              position: cfg.options?.plugins?.legend?.position || "top"
            }
          }
        }
      });
    })();
  </script>
</body>
</html>
