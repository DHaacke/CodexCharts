<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scatter Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --page-bg: linear-gradient(145deg, #d7e7df, #bfd6ce);
      --card-bg: rgba(243,250,246,0.82);
      --title-color: #184f3f;
      --text-color: #2f6f5d;
      --grid-color: rgba(24,79,63,0.2);
      --x-axis-label-color: #184f3f;
      --x-axis-value-color: #2f6f5d;
      --y-axis-label-color: #184f3f;
      --y-axis-value-color: #2f6f5d;
      --legend-text-color: #184f3f;
    }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--page-bg);
      color: var(--text-color);
    }
    #chart-root {
      width: 1280px;
      height: 760px;
      margin: 20px auto;
      box-sizing: border-box;
      padding: 14px;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .transport-summary {
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(0,0,0,0.08);
      color: var(--text-color);
      line-height: 1.35;
    }
    .chart-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
    }
    .error {
      color: #8b1e1e;
      background: rgba(255, 235, 235, 0.9);
      border: 1px solid rgba(139, 30, 30, 0.35);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      white-space: pre-wrap;
    }
    canvas {
      width: 100% !important;
      height: 100% !important;
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet" />
  <style id="chart-theme-injected">
    :root {
      --custom-page-bg: linear-gradient(145deg, #d7e7df, #bfd6ce); --custom-card-bg: rgba(243,250,246,0.82); --custom-title: #184f3f; --custom-text: #2f6f5d; --custom-grid: rgba(24,79,63,0.2); --custom-x-axis-label: #184f3f; --custom-x-axis-value: #2f6f5d; --custom-y-axis-label: #184f3f; --custom-y-axis-value: #2f6f5d; --custom-legend-text: #184f3f;
      --requested-card-width: 1280px; --requested-card-height: 760px; --requested-plot-height: calc(760px - 156px);
      --bg-a: #d7e7df;
      --bg-b: #bfd6ce;
      --card: rgba(243, 250, 246, 0.82);
      --ink: #184f3f;
      --ink-soft: #2f6f5d;
      --line: rgba(24, 79, 63, 0.2);
      --shadow: 0 28px 60px rgba(23, 58, 52, 0.22);      --custom-x-axis-label: #184f3f;
      --custom-x-axis-value: #2f6f5d;
      --custom-y-axis-label: #184f3f;
      --custom-y-axis-value: #2f6f5d;
      --custom-legend-text: #184f3f;    }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Source Sans 3", "Segoe UI", sans-serif !important;
      color: var(--ink);
      display: block !important;
      align-items: initial !important;
      justify-content: initial !important;
      background:
        radial-gradient(circle at 8% 0%, rgba(255, 255, 255, 0.52), transparent 38%),
        radial-gradient(circle at 90% 100%, rgba(255, 255, 255, 0.4), transparent 35%),
        var(--custom-page-bg, linear-gradient(145deg, var(--bg-a), var(--bg-b))) !important;
      padding: clamp(16px, 2.5vw, 34px);
      box-sizing: border-box;
    }

    .page-shell {
      width: min(var(--requested-card-width), calc(100vw - 32px));
      max-width: none;
      margin: 0 auto;
    }

    .wrap {
      max-width: none !important;
      width: 100%;
      margin: 0 !important;
      padding: 0 !important;
    }

    .chart-card {
      background: var(--custom-card-bg, var(--card));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      min-height: min(var(--requested-card-height), calc(100vh - 32px));
      padding: clamp(14px, 2.5vw, 28px);
      backdrop-filter: blur(2px);
      box-sizing: border-box;
    }

    h1, h2, h3, .chart-title, canvas + div {
      font-family: "Merriweather", Georgia, serif !important;
      color: var(--custom-title, var(--ink)) !important;
    }

    #transport-summary {
      font-size: 13px !important;
      font-weight: 600;
      color: var(--custom-text, var(--ink-soft)) !important;
      background: rgba(255, 255, 255, 0.7) !important;
      border: 1px solid var(--line) !important;
      border-radius: 10px !important;
      padding: 8px 12px !important;
      margin-bottom: 12px !important;
    }

    #error {
      border-radius: 10px !important;
      border: 1px solid rgba(167, 48, 48, 0.28) !important;
      background: rgba(255, 236, 236, 0.88) !important;
      color: #7f1d1d !important;
    }

    .card {
      width: 100% !important;
      max-width: none !important;
      height: auto !important;
      margin: 0 !important;
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      padding: clamp(16px, 1.8vw, 24px) !important;
      backdrop-filter: none !important;
      box-sizing: border-box;
    }

    .canvas-wrap {
      width: 100% !important;
      height: auto !important;
      min-height: 0 !important;
    }

    #chart-wrap {
      width: 100% !important;
      min-height: min(72vh, 740px);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.34);
      border: 1px solid var(--custom-grid, var(--line));
      padding: clamp(8px, 1.4vw, 16px);
      box-sizing: border-box;
    }

    #chart-wrap canvas,
    canvas#chart-root,
    #chart-root {
      width: 100% !important;
      height: max(280px, min(var(--requested-plot-height), calc(100vh - 220px))) !important;
      display: block;
    }

    #chartCanvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    @media (max-width: 700px) {
      :root {
        --requested-card-width: calc(100vw - 24px);
      }

      #chart-wrap canvas,
      canvas#chart-root,
      #chart-root {
        height: max(240px, min(var(--requested-plot-height), calc(100vh - 180px))) !important;
      }
    }
  </style>
</head>
<body><div class="page-shell"><div class="chart-card">
  <div id="chart-root">
    <div id="transport-summary" class="transport-summary"></div>
    <div id="message"></div>
    <div class="chart-wrap">
      <canvas id="chartCanvas"></canvas>
    </div>
  </div>

  <script>
    (function () {
      const config = {"request_version":"1.0","output":{"format":"html","container_id":"chart-root","width":1280,"height":760},"chart":{"type":"scatter","title":"{species} {year} Length vs Weight {section}","show_legend":true,"x_axis_label":"Length (mm)","y_axis_label":"Weight (g)"},"data_source":{"proc_schema":"ri","proc_name":"FWPSectionSpeciesLengthWeightScatterByYear","endpoint":"http://localhost:3000/api/stored-proc","http_method":"GET","proc_params":{"year":2026,"section":"Bighorn Section (Upper)","species":"RB"},"result_set_index":0},"mapping":{"xField":"length","yField":"weight"},"options":{"pointRadius":3},"appearance":{"page_background":"linear-gradient(145deg, #d7e7df, #bfd6ce)","card_background":"rgba(243,250,246,0.82)","title_color":"#184f3f","text_color":"#2f6f5d","grid_color":"rgba(24,79,63,0.2)","x_axis_label_color":"#184f3f","x_axis_value_color":"#2f6f5d","y_axis_label_color":"#184f3f","y_axis_value_color":"#2f6f5d","legend_text_color":"#184f3f","series_colors":["#4e79a7","#f28e2b","#59a14f"]}};
      const appearance = config.appearance || {};
      const ds = config.data_source || {};
      const mapping = config.mapping || {};
      const method = (ds.http_method || 'POST').toUpperCase();
      const endpoint = ds.endpoint || '/api/stored-proc';

      const root = document.getElementById(config.output?.container_id || 'chart-root');
      const transportEl = document.getElementById('transport-summary');
      const msgEl = document.getElementById('message');
      const canvas = document.getElementById('chartCanvas');

      if (appearance.page_background) document.documentElement.style.setProperty('--page-bg', appearance.page_background);
      if (appearance.card_background) document.documentElement.style.setProperty('--card-bg', appearance.card_background);
      if (appearance.title_color) document.documentElement.style.setProperty('--title-color', appearance.title_color);
      if (appearance.text_color) document.documentElement.style.setProperty('--text-color', appearance.text_color);
      if (appearance.grid_color) document.documentElement.style.setProperty('--grid-color', appearance.grid_color);
      if (appearance.x_axis_label_color) document.documentElement.style.setProperty('--x-axis-label-color', appearance.x_axis_label_color);
      if (appearance.x_axis_value_color) document.documentElement.style.setProperty('--x-axis-value-color', appearance.x_axis_value_color);
      if (appearance.y_axis_label_color) document.documentElement.style.setProperty('--y-axis-label-color', appearance.y_axis_label_color);
      if (appearance.y_axis_value_color) document.documentElement.style.setProperty('--y-axis-value-color', appearance.y_axis_value_color);
      if (appearance.legend_text_color) document.documentElement.style.setProperty('--legend-text-color', appearance.legend_text_color);

      transportEl.textContent = `Endpoint: http://localhost:3000/api/stored-proc | Method: GET | Proc: FWPSectionSpeciesLengthWeightScatterByYear | Request URL: /api/stored-proc?proc_schema=ri&proc_name=FWPSectionSpeciesLengthWeightScatterByYear&result_set_index=0&proc_params.year=2026&proc_params.section=Bighorn+Section+%28Upper%29&proc_params.species=RB`;

      function showError(text) {
        msgEl.innerHTML = `<div class="error">${text}</div>`;
        canvas.style.display = 'none';
      }

      function fillTemplate(tpl, row, params) {
        if (!tpl || typeof tpl !== 'string') return tpl;
        return tpl.replace(/\{([^}]+)\}/g, (_, key) => {
          if (row && row[key] !== undefined && row[key] !== null) return String(row[key]);
          if (params && params[key] !== undefined && params[key] !== null) return String(params[key]);
          return '';
        });
      }

      async function loadData() {
        const payload = {
          proc_schema: ds.proc_schema,
          proc_name: ds.proc_name,
          proc_params: ds.proc_params,
          result_set_index: ds.result_set_index
        };

        let url = endpoint;
        const fetchOptions = { method };

        if (method === 'GET') {
          const q = new URLSearchParams();
          q.set('proc_schema', payload.proc_schema ?? '');
          q.set('proc_name', payload.proc_name ?? '');
          q.set('proc_params', JSON.stringify(payload.proc_params ?? {}));
          q.set('result_set_index', String(payload.result_set_index ?? 0));
          url += (url.includes('?') ? '&' : '?') + q.toString();
        } else {
          fetchOptions.headers = { 'Content-Type': 'application/json' };
          fetchOptions.body = JSON.stringify(payload);
        }

        const res = await fetch(url, fetchOptions);
        if (!res.ok) {
          throw new Error(`Fetch failed with status ${res.status} (${method} ${endpoint})`);
        }
        return res.json();
      }

      function extractRows(raw) {
        if (Array.isArray(raw)) return raw;
        if (raw && Array.isArray(raw.rows)) return raw.rows;
        if (raw && Array.isArray(raw.data)) return raw.data;
        if (raw && Array.isArray(raw.result)) return raw.result;
        return [];
      }

      (async function init() {
        try {
          const raw = await loadData();
          const rows = extractRows(raw);

          const requiredFields = [mapping.xField, mapping.yField].filter(Boolean);
          const hasValidRow = rows.some(r => requiredFields.every(f => Object.prototype.hasOwnProperty.call(r, f)));
          if (!hasValidRow) {
            const missing = requiredFields.filter(f => !rows.some(r => Object.prototype.hasOwnProperty.call(r, f)));
            showError(`Missing required field(s) for chart mapping: ${missing.join(', ')}`);
            return;
          }

          const title = fillTemplate(config.chart?.title || '', rows[0] || {}, ds.proc_params || {});
          const points = rows
            .filter(r => r[mapping.xField] !== undefined && r[mapping.yField] !== undefined)
            .map(r => ({ x: Number(r[mapping.xField]), y: Number(r[mapping.yField]), _row: r }))
            .filter(p => Number.isFinite(p.x) && Number.isFinite(p.y));

          const colors = (appearance.series_colors && appearance.series_colors.length)
            ? appearance.series_colors
            : ['#4e79a7'];

          const datasetColor = colors[0 % colors.length];

          new Chart(canvas.getContext('2d'), {
            type: 'scatter',
            data: {
              datasets: [{
                label: title || ds.proc_name || 'Series',
                data: points,
                borderColor: datasetColor,
                backgroundColor: datasetColor,
                pointRadius: config.options?.pointRadius ?? 3
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                title: {
                  display: !!title,
                  text: title,
                  color: appearance.title_color || '#111',
                  font: { size: 18, weight: 'bold' }
                },
                legend: {
                  display: !!config.chart?.show_legend,
                  labels: {
                    color: appearance.legend_text_color || appearance.text_color || '#222'
                  }
                },
                tooltip: {
                  callbacks: {
                    label: function(ctx) {
                      return `(${ctx.parsed.x}, ${ctx.parsed.y})`;
                    }
                  }
                }
              },
              scales: {
                x: {
                  title: {
                    display: !!config.chart?.x_axis_label,
                    text: config.chart?.x_axis_label || '',
                    color: appearance.x_axis_label_color || appearance.text_color || '#222'
                  },
                  ticks: {
                    color: appearance.x_axis_value_color || appearance.text_color || '#222'
                  },
                  grid: {
                    color: appearance.grid_color || 'rgba(0,0,0,0.1)'
                  }
                },
                y: {
                  title: {
                    display: !!config.chart?.y_axis_label,
                    text: config.chart?.y_axis_label || '',
                    color: appearance.y_axis_label_color || appearance.text_color || '#222'
                  },
                  ticks: {
                    color: appearance.y_axis_value_color || appearance.text_color || '#222'
                  },
                  grid: {
                    color: appearance.grid_color || 'rgba(0,0,0,0.1)'
                  }
                }
              }
            }
          });
        } catch (err) {
          showError(err.message || String(err));
        }
      })();
    })();
  </script>
</div></div></body>
</html>
